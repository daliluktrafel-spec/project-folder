<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>إنشاء وتتبع المتجر - متاجر البلاد</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
    :root { --gold: #b89b4a; --dark: #1b1e33; --light: #f7f6f2; --success: #27ae60; --danger: #e74c3c; }
    body { margin: 0; font-family: "Segoe UI", Tahoma, sans-serif; background: var(--light); display: flex; justify-content: center; align-items: center; min-height: 100vh; }
    .form-container { background: white; width: 95%; max-width: 600px; border-radius: 30px; box-shadow: 0 20px 50px rgba(0,0,0,0.15); padding: 40px; position: relative; min-height: 400px; }

    #loader { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); color: white; flex-direction: column; justify-content: center; align-items: center; z-index: 9999; }
    .spinner { border: 4px solid #f3f3f3; border-top: 4px solid var(--gold); border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin-bottom: 10px; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

    #checkGate { text-align: center; }
    .gate-btn { background: var(--dark); color: white; padding: 15px; border-radius: 12px; border: none; cursor: pointer; width: 100%; margin-top: 10px; font-weight: bold; font-size: 16px; transition: 0.3s; }
    .gate-link { color: var(--gold); cursor: pointer; display: block; margin-top: 15px; font-weight: bold; text-decoration: underline; }

    .progress-wrapper { display: none; justify-content: space-between; margin-bottom: 40px; position: relative; }
    .progress-line { position: absolute; top: 50%; left: 0; width: 100%; height: 2px; background: #eee; z-index: 1; transform: translateY(-50%); }
    .step-circle { width: 35px; height: 35px; background: white; border: 2px solid #eee; border-radius: 50%; display: flex; justify-content: center; align-items: center; z-index: 2; font-weight: bold; color: #aaa; transition: 0.4s; }
    .step-circle.active { border-color: var(--gold); background: var(--gold); color: white; }

    .form-step { display: none; }
    .form-step.active { display: block; animation: slideIn 0.4s ease-out; }
    @keyframes slideIn { from { opacity: 0; transform: translateX(30px); } to { opacity: 1; transform: translateX(0); } }

    h2 { color: var(--gold); text-align: center; margin-bottom: 25px; }
    input, select, textarea { width: 100%; padding: 14px; border: 2px solid #f0f0f0; border-radius: 12px; box-sizing: border-box; font-size: 16px; margin-bottom: 10px; outline: none; }
    
    .btn-group { display: flex; justify-content: space-between; margin-top: 25px; }
    .btn-next { background: var(--gold); color: white; border: none; padding: 15px 30px; border-radius: 12px; font-weight: bold; cursor: pointer; transition: 0.3s; }
    .btn-next:disabled { background: #eee; color: #ccc; cursor: not-allowed; }
    .btn-prev { background: transparent; color: #aaa; border: none; cursor: pointer; font-weight: bold; }
    
    .status-box { display: none; text-align: center; padding: 20px; border-radius: 20px; margin-top: 15px; border: 2px dashed #ddd; }
    .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; background: #fdfdfd; padding: 15px; border-radius: 12px; border: 1px solid #eee; margin-bottom: 15px; }
    .checkbox-item { display: flex; align-items: center; gap: 8px; font-size: 13px; cursor: pointer; text-align: right; }
</style>
</head>
<body>

<div id="loader">
    <div class="spinner"></div>
    <p id="loader-text">جاري المعالجة...</p>
</div>

<div class="form-container" id="mainContainer">
    <div id="checkGate">
        <h2 style="color: var(--gold);">مرحباً بك في متاجر البلاد</h2>
        <button class="gate-btn" onclick="startNewStore()">✨ إنشاء متجر إلكتروني جديد</button>
        <p class="gate-link" onclick="showTracker()">🔍 تابِع طلبك السابق (الاستعلام)</p>
    </div>

    <div id="trackerArea" style="display:none; text-align: center;">
        <h2 style="color: var(--gold);">تتبع حالة طلبك</h2>
        <input type="tel" id="trackPhone" placeholder="أدخل رقم هاتفك 777XXXXXX">
        <button class="gate-btn" style="background: var(--gold);" onclick="performTrack()">تحقق من القبول</button>
        <p class="gate-link" onclick="backToGate()">رجوع للخلف</p>
        <div id="trackResult" class="status-box"></div>
    </div>

    <div class="progress-wrapper" id="progBar">
        <div class="progress-line"></div>
        <div id="s1" class="step-circle active">1</div>
        <div id="s2" class="step-circle">2</div>
        <div id="s3" class="step-circle">3</div>
        <div id="s4" class="step-circle">4</div>
        <div id="s5" class="step-circle">5</div>
    </div>

    <form id="masterForm" style="display:none;" oninput="checkValidation()">
        <div class="form-step active" id="step1">
            <h2>1. هوية المشروع</h2>
            <input type="text" id="ownerName" placeholder="اسمك الكامل" required>
            <input type="text" id="storeRegion" placeholder="المنطقة" required>
            <input type="text" id="bizName" placeholder="اسم النشاط التجاري" required>
            <textarea id="ownerBio" placeholder="نبذة بسيطة عنك" required></textarea>
        </div>

        <div class="form-step" id="step2">
            <h2>2. التخصص والخدمات</h2>
            <select id="mainSkill" onchange="updateSubSkills()" required>
                <option value="">-- اختر التخصص الرئيسي --</option>
                <option value="البرمجة">البرمجة والتقنية</option>
                <option value="الغذاء">المواد الغذائية والأدوية</option>
                <option value="الأحذية">الأحذية والشنط والملحقات</option>
                <option value="الملابس">بيع الملابس والإكسسوارات</option>
                <option value="الفن">تصميم وأعمال الفن</option>
                <option value="البناء">أعمال البناء والتعمير</option>
                <option value="اخرى">أخرى</option>
            </select>
            <div id="subArea" style="display:none; margin-top:10px;">
                <label style="font-size:14px; color:#b89b4a; margin-bottom:10px; display:block;">ماذا تقدم في هذا التخصص؟</label>
                <div id="subList" class="options-grid"></div>
            </div>
            <textarea id="projDesc" placeholder="نبذة عن مشروعك (20-500 حرف)" minlength="20" required></textarea>
        </div>

        <div class="form-step" id="step3">
            <h2>3. المعرض والاتصال</h2>
            <input type="tel" id="ownerPhone" placeholder="رقم واتساب المتجر" required>
            <label>شعار المتجر (اختياري):</label>
            <input type="file" id="storeLogo" accept="image/*">
        </div>

        <div class="form-step" id="step4">
            <h2>4. السياسات</h2>
            <div class="checkbox-item"><input type="checkbox" id="t1" required><label>أوافق على الشروط والسياسات</label></div>
            <div class="checkbox-item"><input type="checkbox" id="t2" required><label>أتعهد بصحة المعلومات المدخلة</label></div>
        </div>

        <div class="form-step" id="step5">
            <h2>5. تأكيد الإرسال</h2>
            <button type="button" class="btn-next" onclick="finalSubmitToFirebase()" style="width:100%;">إرسال الطلب النهائي</button>
        </div>

        <div class="btn-group" id="navContainer">
            <button type="button" class="btn-prev" id="prevBtn" onclick="move(-1)" style="visibility:hidden;">تراجع</button>
            <button type="button" class="btn-next" id="nextBtn" onclick="move(1)" disabled>التالي</button>
        </div>
    </form>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
    let current = 1; 

    const firebaseConfig = {
        apiKey: "AIzaSyAMEoUTIMAS0mh06_SxrM2T_efDxEmEoxg",
        databaseURL: "https://wafaseiyunshop-default-rtdb.firebaseio.com"
    };
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    function startNewStore() { document.getElementById("checkGate").style.display = "none"; document.getElementById("progBar").style.display = "flex"; document.getElementById("masterForm").style.display = "block"; }
    function showTracker() { document.getElementById("checkGate").style.display = "none"; document.getElementById("trackerArea").style.display = "block"; }
    function backToGate() { document.getElementById("trackerArea").style.display = "none"; document.getElementById("checkGate").style.display = "block"; }

    function checkValidation() {
        const stepDiv = document.getElementById("step" + current);
        if(!stepDiv) return;
        const inputs = stepDiv.querySelectorAll("input[required], textarea[required], select[required]");
        let isValid = true;
        inputs.forEach(el => {
            if (el.type === "checkbox") { if (!el.checked) isValid = false; }
            else if (!el.value.trim()) { isValid = false; }
            if (el.minLength && el.value.length < el.minLength) isValid = false;
        });
        const nextBtn = document.getElementById("nextBtn");
        if(nextBtn) nextBtn.disabled = !isValid;
    }

    function move(n) {
        document.getElementById("step" + current).classList.remove("active");
        current += n;
        document.getElementById("step" + current).classList.add("active");
        for(let i=1; i<=5; i++) {
            let s = document.getElementById("s"+i);
            if(s) s.classList.toggle("active", i <= current);
        }
        document.getElementById("prevBtn").style.visibility = (current === 1 || current === 5) ? "hidden" : "visible";
        document.getElementById("nextBtn").style.display = (current === 5) ? "none" : "block";
        checkValidation();
    }

    function updateSubSkills() {
        const main = document.getElementById("mainSkill").value;
        const subList = document.getElementById("subList");
        subList.innerHTML = "";
        
        const categoriesData = { 
            "البرمجة": ["بيع أكواد برمجية", "خدمات برمجة (عمل أكواد)", "تطوير مواقع الويب", "تطبيقات أندرويد", "الذكاء الاصطناعي"], 
            "الغذاء": ["بيع ألعاب وأدوات ترفيه", "كماليات غذائية", "أدوية وملحقات طبية", "بيع بالجملة"], 
            "الأحذية": ["بيع الشنط والحقائب", "بيع الأحذية", "أعمال ومواد التجميل", "النظارات والكوافي"], 
            "الملابس": ["ملابس رجالية", "ملابس نسائية", "ملحقات الثياب وإكسسوارات", "فساتين ومناسبات"],
            "الفن": ["تصميم جرافيك", "تصميم هدايا مخصص", "أعمال الصوف والخياطة اليدوية", "كتابة وصناعة المحتوى"],
            "البناء": ["مقاولات عامة", "سباكة وكهرباء", "دهانات وديكور", "بيع أدوات البناء"],
            "اخرى": ["خدمات عامة", "تخصص لم يذكر"]
        };

        if(categoriesData[main]) {
            document.getElementById("subArea").style.display = "block";
            categoriesData[main].forEach(item => {
                subList.innerHTML += `<label class="checkbox-item"><input type="checkbox" name="subSkill" value="${item}" onchange="checkValidation()"> ${item}</label>`;
            });
        } else {
            document.getElementById("subArea").style.display = "none";
        }
        checkValidation();
    }

    function performTrack() {
        const phone = document.getElementById("trackPhone").value.trim();
        const res = document.getElementById("trackResult");
        if(!phone) return alert("أدخل رقم الهاتف أولاً");
        res.style.display = "block";
        res.innerHTML = "🔍 جاري الفحص...";
        database.ref("Active_Stores/" + phone).once("value").then(snap => {
            const activeData = snap.val();
            if(activeData) {
                res.style.background = "#e8f5e9";
                res.innerHTML = `<h3>🎉 مبروك! مقبول</h3><p>كلمة السر: <b>${activeData.password}</b></p><button class="gate-btn" onclick="location.href='stores.html'">دخول</button>`;
            } else {
                database.ref("Pending_Stores").orderByChild("ownerPhone").equalTo(phone).once("value", pendingSnap => {
                    const pendingData = pendingSnap.val();
                    if(pendingData) {
                        res.style.background = "#fff3e0";
                        res.innerHTML = `<h3>⏳ قيد المراجعة</h3><p>طلبك بانتظار موافقة حسين السقاف.</p>`;
                    } else {
                        res.style.background = "#ffebee";
                        res.innerHTML = `<h3>❌ لا يوجد طلب</h3><p>الرقم غير مسجل أو مرفوض.</p>`;
                    }
                });
            }
        });
    }

    async function finalSubmitToFirebase() {
        document.getElementById("loader").style.display = "flex";
        
        let logoUrl = "no-logo.png";
        const logoFile = document.getElementById("storeLogo").files[0];
        const selectedSubs = Array.from(document.querySelectorAll('input[name="subSkill"]:checked')).map(el => el.value);

        if (logoFile) {
            const formData = new FormData();
            formData.append("image", logoFile);
            try {
                const response = await fetch("https://api.imgbb.com/1/upload?key=18fe45ec36063f58b6895c320bf08330", {
                    method: "POST", body: formData
                });
                const res = await response.json();
                if (res.success) logoUrl = res.data.url;
            } catch (e) { console.error("Logo upload failed", e); }
        }

        const data = {
            ownerName: document.getElementById("ownerName").value,
            storeRegion: document.getElementById("storeRegion").value,
            bizName: document.getElementById("bizName").value,
            mainSkill: document.getElementById("mainSkill").value,
            subSkills: selectedSubs,
            ownerPhone: document.getElementById("ownerPhone").value,
            projDesc: document.getElementById("projDesc").value,
            logo: logoUrl,
            status: "pending",
            date: new Date().toLocaleString()
        };

        database.ref("Pending_Stores").push(data).then(() => {
            document.getElementById("loader").style.display = "none";
            document.getElementById("mainContainer").innerHTML = `
                <div style="text-align:center; padding:20px;">
                    <h2 style="color:var(--gold);">تم الإرسال بنجاح! ✅</h2>
                    <p>سوف يراجع حسين السقاف طلبك خلال 14 ساعة.</p>
                    <button onclick="location.href='fields.html'" class="gate-btn">العودة للرئيسية</button>
                </div>`;
        }).catch(() => {
            document.getElementById("loader").style.display = "none";
            alert("حدث خطأ في الإرسال");
        });
    }
</script>
</body>
</html>
