<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>عجلة الحظ الخرافية | متاجر البلاد</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@700&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; font-family: 'Cairo', sans-serif; background: radial-gradient(circle, #1b1e33 0%, #0f111a 100%); color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        
        .wheel-container { position: relative; width: 350px; height: 350px; filter: drop-shadow(0 0 20px rgba(184, 155, 74, 0.4)); }
        
        /* السهم المشير للجائزة */
        .arrow { position: absolute; top: -20px; left: 50%; transform: translateX(-50%); width: 0; height: 0; border-left: 20px solid transparent; border-right: 20px solid transparent; border-top: 40px solid #e74c3c; z-index: 100; filter: drop-shadow(0 4px 5px rgba(0,0,0,0.5)); }

        canvas { width: 100%; height: 100%; border: 10px solid #b89b4a; border-radius: 50%; background: #252943; transition: transform 6s cubic-bezier(0.15, 0, 0.15, 1); }

        .spin-btn { margin-top: 40px; padding: 18px 50px; background: linear-gradient(45deg, #b89b4a, #dec470); border: none; border-radius: 50px; font-size: 22px; font-weight: 900; cursor: pointer; color: #1b1e33; box-shadow: 0 10px 25px rgba(184, 155, 74, 0.4); transition: 0.3s; }
        .spin-btn:hover { transform: scale(1.05); filter: brightness(1.2); }
        .spin-btn:disabled { background: #555; cursor: not-allowed; box-shadow: none; }

        /* نافذة الفوز الفاخرة */
        #win-msg { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 1000; flex-direction: column; align-items: center; justify-content: center; text-align: center; animation: fadeIn 0.5s; }
        .win-box { background: #fff; color: #1b1e33; padding: 30px; border-radius: 30px; width: 80%; max-width: 350px; border: 5px solid #b89b4a; box-shadow: 0 0 50px #b89b4a; }
        
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <h2 style="color: #dec470; text-shadow: 0 2px 10px rgba(0,0,0,0.5);">🎡 جرب حظك الملكي اليوم</h2>
    
    <div class="wheel-container">
        <div class="arrow"></div>
        <canvas id="wheel" width="500" height="500"></canvas>
    </div>

    <button id="spin-btn" class="spin-btn" onclick="startSpin()">إبرم العجلة 🚀</button>

    <div id="win-msg">
        <div class="win-box">
            <h1 style="font-size: 50px; margin: 0;">🎁</h1>
            <h2 id="prize-name" style="color:#b89b4a; margin: 10px 0;"></h2>
            <p id="prize-desc" style="font-weight: bold; color: #555;"></p>
            <button onclick="exit()" style="margin-top: 20px; padding: 12px 40px; background: #1b1e33; color: #b89b4a; border: none; border-radius: 15px; cursor: pointer; font-weight: bold; font-family: 'Cairo';">العودة للرئيسية</button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <script src="firebase.js"></script>

    <script>
        const canvas = document.getElementById('wheel');
        const ctx = canvas.getContext('2d');
        const prizes = [
            { text: "10 نقاط", color: "#1b1e33", type: "points", val: 10 },
            { text: "حظ أوفر", color: "#b89b4a", type: "fail", val: 0 },
            { text: "20 نقطة", color: "#1b1e33", type: "points", val: 20 },
            { text: "500 ريال", color: "#dec470", type: "cash", val: 500 },
            { text: "5 نقاط", color: "#1b1e33", type: "points", val: 5 },
            { text: "توصيل مجاني", color: "#b89b4a", type: "extra", val: 0 }
        ];

        const numPrizes = prizes.length;
        const arc = (Math.PI * 2) / numPrizes;

        function draw() {
            ctx.clearRect(0,0,500,500);
            prizes.forEach((p, i) => {
                const angle = i * arc;
                ctx.beginPath();
                ctx.fillStyle = p.color;
                ctx.moveTo(250, 250);
                ctx.arc(250, 250, 240, angle, angle + arc);
                ctx.fill();
                ctx.strokeStyle = "#dec470"; ctx.lineWidth = 2; ctx.stroke();

                ctx.save();
                ctx.translate(250, 250);
                ctx.rotate(angle + arc / 2);
                ctx.fillStyle = (p.color === "#1b1e33") ? "#dec470" : "#1b1e33";
                ctx.font = "bold 22px Cairo";
                ctx.textAlign = "right";
                ctx.fillText(p.text, 220, 10);
                ctx.restore();
            });
        }
        draw();

        function startSpin() {
            // التحقق من الوقت (كل 24 ساعة)
            const last = localStorage.getItem("lastSpinTime");
            if(last && (Date.now() - last < 86400000)) {
                alert("لقد جربت حظك اليوم، عد إلينا غداً يا بطل! ✨");
                return;
            }

            const btn = document.getElementById('spin-btn');
            btn.disabled = true;

            // اختيار عشوائي حقيقي
            const selectedIndex = Math.floor(Math.random() * numPrizes);
            
            // حساب الزاوية بدقة (لكي يتوقف السهم بمنتصف الجائزة)
            const degreesPerPrize = 360 / numPrizes;
            // 270 هي تعديل مكان البداية ليتوافق مع السهم العلوي
            const stopAngle = (360 - (selectedIndex * degreesPerPrize)) - (degreesPerPrize / 2);
            const totalRotation = (360 * 10) + stopAngle; // 10 دورات كاملة ثم الوقوف

            canvas.style.transform = `rotate(${totalRotation}deg)`;

            setTimeout(() => finalize(prizes[selectedIndex]), 6500);
        }

        function finalize(prize) {
            const user = localStorage.getItem("userName");
            localStorage.setItem("lastSpinTime", Date.now());

            let desc = "حظاً أوفر في المرة القادمة!";

            // المنطق البرمجي للجوائز
            if (prize.type === "points") {
                database.ref("Users/" + user + "/points").transaction(p => (p || 0) + prize.val);
                desc = `تمت إضافة ${prize.val} نقطة لرصيدك بنجاح! ✅`;
            } 
            else if (prize.type === "cash") {
                // ✅ إضافة 500 ريال للمحفظة فوراً
                database.ref("Users/" + user + "/wallet").transaction(w => (w || 0) + prize.val);
                desc = "مبروووك! تمت إضافة 500 ريال لمحفظتك الآن! 💰";
            }
            else if (prize.type === "extra") {
                desc = "تواصل مع الإدارة للحصول على قسيمة التوصيل! 🛵";
            }

            // إرسال سجل للإدارة
            database.ref("Admin_Notifications/LuckyWheel").push({
                user: user, prize: prize.text, time: Date.now()
            });

            document.getElementById('prize-name').innerText = "ربحت: " + prize.text;
            document.getElementById('prize-desc').innerText = desc;
            document.getElementById('win-msg').style.display = "flex";
        }

        function exit() { window.location.replace("fields.html"); }
    </script>
</body>
</html>
