<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>دردشة المندوب | متاجر البلاد</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root { --gold: #b89b4a; --dark: #1b1e33; }
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        .header { background: var(--dark); color: white; padding: 15px; text-align: center; border-bottom: 3px solid var(--gold); }
        .chat-box { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; background: #e5ddd5; }
        .msg { padding: 12px; border-radius: 15px; max-width: 80%; font-size: 15px; line-height: 1.4; position: relative; }
        .driver-msg { background: #dcf8c6; align-self: flex-start; border-bottom-left-radius: 2px; box-shadow: 0 1px 2px rgba(0,0,0,0.1); }
        .customer-msg { background: white; align-self: flex-end; border-bottom-right-radius: 2px; box-shadow: 0 1px 2px rgba(0,0,0,0.1); }
        .input-area { background: white; padding: 15px; display: flex; gap: 10px; align-items: center; }
        input { flex: 1; padding: 12px; border-radius: 25px; border: 1px solid #ddd; outline: none; }
        .send-btn { background: var(--dark); color: white; border: none; padding: 10px 20px; border-radius: 25px; cursor: pointer; font-weight: bold; }
    </small></style>
</head>
<body>

<div class="header">
    <h3 style="margin:0;">💬 التواصل مع الزبون</h3>
    <small id="cust-info">جاري جلب بيانات الزبون...</small>
</div>

<div class="chat-box" id="chat-content"></div>

<div class="input-area">
    <input type="text" id="m-input" placeholder="اكتب رسالتك للزبون...">
    <button class="send-btn" onclick="sendToCustomer()">إرسال</button>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script src="firebase.js"></script>
<script>
    const urlParams = new URLSearchParams(window.location.search);
    const orderId = urlParams.get('orderId');
    const myPhone = localStorage.getItem("driverPhone"); // تأكد من حفظه عند الدخول

    // جلب بيانات الطلب لمعرفة اسم الزبون
    database.ref("Orders/" + orderId).once("value", snap => {
        const ord = snap.val();
        if(ord) document.getElementById("cust-info").innerText = "الزبون: " + ord.customer + " | المنطقة: " + ord.region;
    });

    // إرسال رسالة من المندوب
    function sendToCustomer() {
        const text = document.getElementById("m-input").value.trim();
        if(!text) return;
        database.ref("Chats/" + orderId).push({
            sender: "driver", // لتمييز أن المرسل هو المندوب
            text: text,
            time: Date.now()
        });
        document.getElementById("m-input").value = "";
    }

    // عرض الرسائل فور وصولها
    database.ref("Chats/" + orderId).on("child_added", snap => {
        const m = snap.val();
        const box = document.getElementById("chat-content");
        const div = document.createElement("div");
        div.className = `msg ${m.sender === 'driver' ? 'driver-msg' : 'customer-msg'}`;
        div.innerText = m.text;
        box.appendChild(div);
        box.scrollTop = box.scrollHeight;
    });
</script>
</body>
</html>
