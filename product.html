<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>تفاصيل المنتج - متاجر البلاد</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
    body { 
        margin: 0; 
        font-family: "Segoe UI", Tahoma, Arial, sans-serif; 
        background: linear-gradient(to bottom,#f9f5f0,#f0e8d0);
        color: #333; 
        display: flex; 
        justify-content: center; 
        align-items: center; 
        min-height: 100vh;
    }

    .product-card {
        position: relative;
        background: #fff;
        border-radius: 20px;
        max-width: 500px;
        width: 95%;
        box-shadow: 0 10px 30px rgba(184, 155, 74, 0.2);
        padding: 0;
        text-align: center;
        overflow: hidden;
        margin: 20px 0;
    }

    .img-wrapper { position: relative; width: 100%; background: #fdfdfd; }
    .product-img { width: 100%; aspect-ratio: 1 / 1; object-fit: contain; display: block; }

    .favorite-btn {
        position: absolute; top: 15px; left: 15px; background: white;
        border-radius: 50%; width: 45px; height: 45px; border: none;
        font-size: 24px; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        z-index: 10;
    }
    .favorite-btn.active { color: #e74c3c; }

    .share-btn {
        position: absolute; top: 15px; right: 15px; background: white;
        border-radius: 50%; width: 45px; height: 45px; border: none;
        font-size: 20px; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        display: flex; justify-content: center; align-items: center;
        z-index: 10;
    }

    .info-section { padding: 20px; }
    .product-name { font-size: 26px; font-weight: bold; color: #8b5e3c; margin-bottom: 10px; }
    .product-price { font-size: 22px; font-weight: bold; color: #d49f5f; margin-bottom: 15px; }
    
    .detail-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px dashed #eee; font-size: 16px; }
    .detail-label { color: #888; }
    .detail-value { font-weight: 600; color: #444; }

    .btn-group { display: flex; flex-direction: column; gap: 12px; padding: 20px; }
    .btn-main {
        border: none; border-radius: 12px; padding: 15px;
        font-weight: bold; font-size: 16px; cursor: pointer;
        transition: 0.3s; display: flex; align-items: center; justify-content: center; gap: 10px;
    }
    .btn-wa { background: #25D366; color: white; }
    .btn-bank { background: #1b1e33; color: white; }
    .btn-card { background: linear-gradient(45deg,#d4af7f,#f7e1b5); color: #333; }
    .btn-back { background: #eee; color: #666; margin-top: 5px; }

    .modal {
        display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(0,0,0,0.7); z-index: 9999; justify-content: center; align-items: center;
    }
    .modal-content {
        background: white; width: 90%; max-width: 400px; padding: 25px;
        border-radius: 20px; text-align: center; position: relative;
        animation: slideUp 0.3s ease-out;
    }
    @keyframes slideUp { from { transform: translateY(50px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    
    .bank-card {
        background: #f8f9fa; border-right: 5px solid #b89b4a;
        padding: 15px; margin: 15px 0; text-align: right; border-radius: 8px;
    }
    .bank-name { font-weight: bold; color: #1b1e33; font-size: 18px; }
    .acc-num { color: #b89b4a; font-family: monospace; font-size: 20px; display: block; margin-top: 5px; }
</style>
</head>
<body>

<div class="product-card">
    <div class="img-wrapper">
        <button class="favorite-btn" id="favBtn">♡</button>
        <button class="share-btn" id="shareBtn">🔗</button> 
        <img src="" alt="صورة المنتج" class="product-img" id="product-img">
    </div>
    
    <div class="info-section">
        <div class="product-name" id="product-name">جاري التحميل...</div>
        <div class="product-price" id="product-price">--</div>
        
        <div class="detail-row">
            <span class="detail-label">حالة المنتج:</span>
            <span class="detail-value" id="product-status">--</span>
        </div>
        <div class="detail-row">
            <span class="detail-label">المتجر:</span>
            <span class="detail-value" id="product-store">--</span>
        </div>
    </div>

    <div class="btn-group">
        <button class="btn-main btn-wa" id="order-wa">🟢 الطلب عبر واتساب</button>
        <button class="btn-main btn-bank" id="order-bank">🏦 عبر الكريمي أو العمقي</button>
        <button class="btn-main btn-card" id="order-card">💳 الطلب عبر بطاقة</button>
        <button class="btn-main btn-back" onclick="window.history.back()">رجوع</button>
    </div>
</div>

<div id="bank-modal" class="modal">
    <div class="modal-content">
        <h3 style="margin-top:0; color:#1b1e33;">بيانات التحويل</h3>
        <p style="font-size:14px; color:#666;">باسم: حسين علي عبداللاه السقاف</p>
        
        <div class="bank-card">
            <div class="bank-name">مصرف الكريمي</div>
            <span class="acc-num">3018795409</span>
        </div>
        
        <div class="bank-card">
            <div class="bank-name">شركة العمقي</div>
            <span class="acc-num">254154993</span>
        </div>

        <p style="font-size:12px; color:#d9534f; font-weight:bold;">* يرجى إرسال صورة الإشعار بعد التحويل</p>
        
        <button class="btn-main btn-wa" onclick="confirmBankTransfer()" style="width:100%;">تأكيد وإرسال الإشعار عبر واتساب</button>
        <button onclick="closeModal()" style="background:none; border:none; color:#999; margin-top:15px; cursor:pointer;">إغلاق</button>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script src="firebase.js"></script>

<script>
const urlParams = new URLSearchParams(window.location.search);
const productId = String(urlParams.get('productId'));
let currentProduct = null;

database.ref("products").once("value").then(snapshot => {
    const data = snapshot.val() || {};
    const products = Object.values(data);
    currentProduct = products.find(p => String(p.id) === productId);

    if(!currentProduct) {
        alert("المنتج غير موجود!");
        return;
    }

    document.getElementById("product-name").innerText = currentProduct.name;
    document.getElementById("product-price").innerText = currentProduct.price;
    document.getElementById("product-status").innerText = currentProduct.status;
    document.getElementById("product-store").innerText = currentProduct.store;
    document.getElementById("product-img").src = currentProduct.image || "no-image.png";

    const userName = localStorage.getItem("userName") || "مستخدم جديد";
    const userRegion = localStorage.getItem("userRegion") || "غير محدد";

    document.getElementById("order-wa").onclick = () => {
        const msg = `*طلب جديد (واتساب)*%0Aالاسم: ${userName}%0Aالمنطقة: ${userRegion}%0Aالمنتج: ${currentProduct.name}%0Aالمتجر: ${currentProduct.store}`;
        window.open(`https://wa.me/967774257557?text=${msg}`, '_blank');
    };

    document.getElementById("order-card").onclick = () => {
        alert("خدمة الدفع بالبطاقة ستتوفر قريباً داخل المنصة. حالياً يرجى استخدام التحويل البنكي.");
    };

    // كود المشاركة تم وضعه هنا لضمان وجود بيانات المنتج
    document.getElementById("shareBtn").onclick = async () => {
        const shareData = {
            title: currentProduct.name,
            text: `شاهد هذا المنتج الرائع على منصة متاجر البلاد: ${currentProduct.name}`,
            url: window.location.href
        };
        try {
            if (navigator.share) {
                await navigator.share(shareData);
            } else {
                await navigator.clipboard.writeText(window.location.href);
                alert("تم نسخ رابط المنتج! يمكنك الآن مشاركته في أي مكان.");
            }
        } catch (err) { console.log("خطأ في المشاركة:", err); }
    };

}).catch(err => console.error(err));

const modal = document.getElementById("bank-modal");
document.getElementById("order-bank").onclick = () => modal.style.display = "flex";
function closeModal() { modal.style.display = "none"; }

function confirmBankTransfer() {
    const userName = localStorage.getItem("userName") || "مستخدم";
    const msg = `*إشعار تحويل بنكي*%0Aالاسم: ${userName}%0Aقمت بالتحويل لطلب المنتج: ${currentProduct.name}%0Aبانتظار التأكيد لعملية الشحن.`;
    window.open(`https://wa.me/967774257557?text=${msg}`, '_blank');
    closeModal();
}

let favorites = JSON.parse(localStorage.getItem("favorites") || "[]");
const favBtn = document.getElementById("favBtn");

function updateFavBtn(){
    const idNum = Number(productId);
    if(favorites.includes(idNum)){
        favBtn.innerText = "❤"; favBtn.classList.add("active");
    } else {
        favBtn.innerText = "♡"; favBtn.classList.remove("active");
    }
}
updateFavBtn();

favBtn.onclick = () => {
    const idNum = Number(productId);
    if(favorites.includes(idNum)) {
        favorites = favorites.filter(f => f !== idNum);
    } else {
        favorites.push(idNum);
    }
    localStorage.setItem("favorites", JSON.stringify(favorites));
    updateFavBtn();
};
</script>
</body>
</html>
