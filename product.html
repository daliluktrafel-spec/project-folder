<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>تفاصيل المنتج - متاجر البلاد</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
    :root { --gold: #b89b4a; --dark: #1b1e33; --light: #f9f5f0; }
    body { margin: 0; font-family: "Segoe UI", Tahoma, sans-serif; background: linear-gradient(to bottom,#f9f5f0,#f0e8d0); color: #333; padding-bottom: 40px; }
    .product-card { background: #fff; border-radius: 20px; max-width: 500px; width: 95%; box-shadow: 0 10px 30px rgba(184, 155, 74, 0.2); overflow: hidden; margin: 20px auto; text-align: center; position: relative; }
    .img-wrapper { position: relative; width: 100%; background: #fdfdfd; }
    .product-img { width: 100%; aspect-ratio: 1 / 1; object-fit: contain; }
    .favorite-btn, .share-btn { position: absolute; top: 15px; background: white; border-radius: 50%; width: 45px; height: 45px; border: none; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.1); z-index: 10; display: flex; justify-content: center; align-items: center; font-size: 22px; transition: 0.3s; }
    .favorite-btn { left: 15px; color: #ccc; }
    .favorite-btn.active { color: #e74c3c; }
    .share-btn { right: 15px; color: var(--dark); }
    .info-section { padding: 20px; }
    .product-name { font-size: 26px; font-weight: bold; color: #8b5e3c; margin-bottom: 10px; }
    .detail-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px dashed #eee; font-size: 15px; }
    .btn-group { display: flex; flex-direction: column; gap: 12px; padding: 20px; }
    .btn-main { border: none; border-radius: 12px; padding: 15px; font-weight: bold; cursor: pointer; transition: 0.3s; display: flex; align-items: center; justify-content: center; gap: 10px; font-size: 16px; text-decoration: none; }
    .btn-wa { background: #25D366; color: white; }
    .btn-delivery { background: #e67e22; color: white; }
    .btn-back { background: #eee; color: #666; }
    
    /* ستايل الخصم المتطور */
    #wallet-deduction-area { background: #fffde7; border: 1px dashed var(--gold); padding: 15px; border-radius: 15px; margin: 15px; display: none; flex-direction: column; gap: 10px; }
    .discount-select { width: 100%; padding: 10px; border-radius: 10px; border: 1px solid #ddd; font-weight: bold; }
</style>
</head>
<body>

<div class="product-card">
    <div class="img-wrapper">
        <button class="favorite-btn" id="favBtn">❤</button>
        <button class="share-btn" id="copyBtn">🔗</button> 
        <img src="" class="product-img" id="product-img">
    </div>
    <div class="info-section">
        <div class="product-name" id="product-name">جاري التحميل...</div>
        <div id="product-price" style="font-size:24px; font-weight:bold; color:var(--gold);">--</div>

        <div id="wallet-deduction-area">
            <div style="font-weight:bold; font-size:14px;">💰 رصيدك المتاح: <span id="user-wallet-balance">0</span> ر.ي</div>
            <select id="discount-amount-list" class="discount-select">
                <option value="0">--- اختر مبلغ الخصم ---</option>
                <option value="1000">خصم 1000 ر.ي</option>
                <option value="2000">خصم 2000 ر.ي</option>
                <option value="3000">خصم 3000 ر.ي</option>
                <option value="4000">خصم 4000 ر.ي</option>
                <option value="5000">خصم 5000 ر.ي</option>
                <option value="10000">خصم 10000 ر.ي</option>
            </select>
            <button class="btn-main" style="background:var(--gold); color:white; padding:8px; font-size:14px;" onclick="applySelectedDiscount()">تطبيق الخصم الآن</button>
        </div>
        
        <div id="final-price-display" style="display:none; color: #27ae60; font-weight: bold; margin: 10px 0; padding:10px; border:2px solid #27ae60; border-radius:10px;">
            صافي السعر للدفع: <span id="new-price">0</span> ر.ي
        </div>

        <div class="detail-row"><span>الحالة:</span><b id="product-status">--</b></div>
        <div class="detail-row"><span>المتجر:</span><b id="product-store">--</b></div>
    </div>

    <div class="btn-group" id="main-btn-group">
        <button class="btn-main btn-wa" id="order-wa">🟢 طلب مباشر عبر واتساب</button>
        <button class="btn-main btn-delivery" id="order-delivery-btn" onclick="sendOrderToDriver()">🛵 طلب عبر مندوب مقابل + 1000</button>
        <button class="btn-main btn-back" onclick="window.history.back()">رجوع للخلف</button>
    </div>

    <div class="related-section">
        <div class="related-title">منتجات قد تعجبك 🛍️</div>
        <div id="related-list" class="related-container" style="display: flex; gap: 12px; overflow-x: auto; padding: 10px;"></div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script src="firebase.js"></script>

<script>
const urlParams = new URLSearchParams(window.location.search);
const productId = String(urlParams.get('productId'));
let currentProduct = null;
let discountValue = 0;
const userName = localStorage.getItem("userName");
const userRegion = localStorage.getItem("userRegion") || "";

// 1. تحميل البيانات الأساسية
database.ref("products").once("value").then(snap => {
    const data = snap.val() || {};
    currentProduct = Object.values(data).find(p => String(p.id) === productId);
    if(!currentProduct) return alert("المنتج غير موجود");

    document.getElementById("product-name").innerText = currentProduct.name;
    document.getElementById("product-status").innerText = currentProduct.status;
    document.getElementById("product-store").innerText = currentProduct.store;
    document.getElementById("product-img").src = currentProduct.image || "";
    document.getElementById("product-price").innerText = currentProduct.price + " ريال";

    loadWalletInfo();
    initFavorite();
    checkActiveOrder();
    loadRelatedProducts(currentProduct);
});

// 2. جلب رصيد المحفظة
function loadWalletInfo() {
    if(!userName) return;
    database.ref("Users/" + userName + "/wallet").on("value", snap => {
        const balance = snap.val() || 0;
        if (balance > 0) {
            document.getElementById("wallet-deduction-area").style.display = "flex";
            document.getElementById("user-wallet-balance").innerText = balance;
        }
    });
}

// 3. تطبيق الخصم من القائمة
function applySelectedDiscount() {
    // جلب الرصيد من النص وتنظيفه من أي كلمات أو مسافات
    const balanceText = document.getElementById("user-wallet-balance").innerText;
    const balance = parseInt(balanceText.replace(/\D/g, '')) || 0; 
    
    // جلب القيمة المختارة من القائمة
    const selectedAmount = parseInt(document.getElementById("discount-amount-list").value) || 0;
    
    // جلب سعر المنتج وتنظيفه
    const priceText = document.getElementById("product-price").innerText;
    const originalPrice = parseInt(priceText.replace(/\D/g, '')) || 0;

    console.log("الرصيد المحسوب:", balance); // للتأكد في الكونسول
    console.log("الخصم المختار:", selectedAmount);

    if (selectedAmount > 0 && selectedAmount <= balance) {
        if (selectedAmount >= originalPrice) {
            alert("⚠️ لا يمكن أن يكون الخصم أكبر من أو يساوي سعر المنتج نفسه!");
            return;
        }
        discountValue = selectedAmount;
        document.getElementById("new-price").innerText = (originalPrice - discountValue).toLocaleString();
        document.getElementById("final-price-display").style.display = "block";
        alert("✅ تم تطبيق الخصم بنجاح!");
    } else {
        alert("⚠️ عذراً، رصيدك الحالي (" + balance + ") لا يكفي لخصم مبلغ (" + selectedAmount + ")");
    }
}
// 4. إرسال الطلب للمندوب (الخصم الفعلي)
function sendOrderToDriver() {
    if(!userName) return alert("يرجى تسجيل الدخول أولاً");
    
    const orderID = "ORD-" + Date.now();
    const originalPriceNum = parseInt(currentProduct.price.replace(/\D/g,''));
    
    const orderData = {
        id: orderID,
        customer: userName,
        pName: currentProduct.name,
        originalPrice: originalPriceNum,
        price: originalPriceNum - discountValue,
        walletUsed: discountValue,
        region: userRegion,
        store: currentProduct.store,
        status: "waiting",
        timestamp: Date.now()
    };
database.ref("Users/" + userName + "/points").transaction(p => (p || 0) + 10);
    database.ref("Orders/" + orderID).set(orderData).then(() => {
        if(discountValue > 0) {
            database.ref("Users/" + userName + "/wallet").transaction(b => (b || 0) - discountValue);
        }
        alert("تم إرسال طلبك بنجاح! جاري تحويلك للتتبع والدردشة...");
        location.href = `track-order.html?orderId=${orderID}`;
    });
}

// 5. واتساب مباشر
document.getElementById("order-wa").onclick = () => {
    const msg = `حياكم الله، أريد شراء: ${currentProduct.name}\nالسعر: ${currentProduct.price}\nالمنطقة: ${userRegion}`;
    window.open(`https://wa.me/967774257557?text=${encodeURIComponent(msg)}`, '_blank');
};

// 6. المفضلة
function initFavorite() {
    const favBtn = document.getElementById("favBtn");
    let favorites = JSON.parse(localStorage.getItem("favorites") || "[]").map(String);
    if (favorites.includes(productId)) favBtn.classList.add("active");

    favBtn.onclick = () => {
        let currentFavs = JSON.parse(localStorage.getItem("favorites") || "[]").map(String);
        if (currentFavs.includes(productId)) {
            currentFavs = currentFavs.filter(id => id !== productId);
            favBtn.classList.remove("active");
        } else {
            currentFavs.push(productId);
            favBtn.classList.add("active");
        }
        localStorage.setItem("favorites", JSON.stringify(currentFavs));
    };
}

// 7. نشر الرابط
document.getElementById("copyBtn").onclick = () => {
    navigator.clipboard.writeText(window.location.href);
    alert("✅ تم نسخ رابط المنتج!");
};

// 8. فحص الطلبات النشطة (للتحويل للدردشة)
function checkActiveOrder() {
    database.ref("Orders").orderByChild("customer").equalTo(userName).on("value", snap => {
        const orders = snap.val();
        if (orders) {
            Object.values(orders).forEach(ord => {
                if (ord.pName === currentProduct.name && ord.status !== "delivered") {
                    document.getElementById("main-btn-group").innerHTML = `
                        <div style="background:#fff3e0; padding:15px; border-radius:12px; border:1.5px solid #e67e22; margin-bottom:10px;">
                            <p style="margin:0; font-weight:bold; color:#e67e22;">لديك طلب جاري الآن!</p>
                            <button class="btn-main" style="background:#e67e22; color:white; margin-top:10px;" 
                                onclick="location.href='track-order.html?orderId=${ord.id}'">💬 تتبع الطلب والدردشة</button>
                        </div>
                        <button class="btn-main btn-back" onclick="window.history.back()">رجوع</button>`;
                }
            });
        }
    });
}

function loadRelatedProducts(currentP) {
    database.ref("products").once("value").then(snap => {
        const all = Object.values(snap.val() || {});
        const related = all.filter(p => p.category === currentP.category && String(p.id) !== productId).slice(0, 5);
        const list = document.getElementById("related-list");
        list.innerHTML = "";
        related.forEach(rp => {
            list.innerHTML += `<div onclick="location.href='product.html?productId=${rp.id}'" style="min-width:120px; background:white; padding:10px; border-radius:10px; text-align:center; font-size:12px; box-shadow:0 2px 5px rgba(0,0,0,0.1);">
                <img src="${rp.image}" style="width:100%; aspect-ratio:1/1; object-fit:cover; border-radius:5px;"><br><b>${rp.name}</b><br><span style="color:var(--gold)">${rp.price}</span>
            </div>`;
        });
    });
}
</script>
</body>
</html>
