<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>تفاصيل المنتج - متاجر البلاد</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
    :root { --gold: #b89b4a; --dark: #1b1e33; --light: #f9f5f0; }
    body { margin: 0; font-family: "Segoe UI", Tahoma, sans-serif; background: linear-gradient(to bottom,#f9f5f0,#f0e8d0); color: #333; padding-bottom: 40px; }
    .product-card { background: #fff; border-radius: 20px; max-width: 500px; width: 95%; box-shadow: 0 10px 30px rgba(184, 155, 74, 0.2); overflow: hidden; margin: 20px auto; text-align: center; }
    .img-wrapper { position: relative; width: 100%; background: #fdfdfd; }
    .product-img { width: 100%; aspect-ratio: 1 / 1; object-fit: contain; }
    .favorite-btn, .share-btn { position: absolute; top: 15px; background: white; border-radius: 50%; width: 45px; height: 45px; border: none; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.1); z-index: 10; display: flex; justify-content: center; align-items: center; }
    .favorite-btn { left: 15px; font-size: 24px; }
    .favorite-btn.active { color: #e74c3c; }
    .share-btn { right: 15px; }
    .info-section { padding: 20px; }
    .product-name { font-size: 26px; font-weight: bold; color: #8b5e3c; margin-bottom: 10px; }
    .product-price { font-size: 22px; font-weight: bold; color: var(--gold); margin-bottom: 15px; }
    .detail-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px dashed #eee; }
    .btn-group { display: flex; flex-direction: column; gap: 12px; padding: 20px; }
    .btn-main { border: none; border-radius: 12px; padding: 15px; font-weight: bold; cursor: pointer; transition: 0.3s; display: flex; align-items: center; justify-content: center; gap: 10px; }
    .btn-wa { background: #25D366; color: white; }
    .btn-delivery { background: #e67e22; color: white; }
    .btn-back { background: #eee; color: #666; }
    .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 9999; justify-content: center; align-items: center; }
    .modal-content { background: white; width: 90%; max-width: 400px; padding: 25px; border-radius: 20px; text-align: center; }
    .driver-card { background: #f8f9fa; border-right: 5px solid var(--gold); padding: 12px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; border-radius: 8px; }
</style>
</head>
<body>

<div class="product-card">
    <div class="img-wrapper">
        <button class="favorite-btn" id="favBtn">♡</button>
        <button class="share-btn" id="shareBtn">🔗</button> 
        <img src="" class="product-img" id="product-img">
    </div>
    <div class="info-section">
        <div class="product-name" id="product-name">جاري التحميل...</div>
        <div class="product-price" id="product-price">--</div>
        <div class="detail-row"><span>الحالة:</span><b id="product-status">--</b></div>
        <div class="detail-row"><span>المتجر:</span><b id="product-store">--</b></div>
    </div>
    <div class="btn-group" id="main-btn-group">
        <button class="btn-main btn-wa" id="order-wa">🟢 طلب مباشر عبر واتساب</button>
        <button class="btn-main btn-delivery" id="order-delivery">🛵 طلب عبر مندوب (منطقتي)</button>
        <button class="btn-main btn-back" onclick="window.history.back()">رجوع</button>
    </div>
</div>

<div id="delivery-modal" class="modal">
    <div class="modal-content">
        <h3>اختر مندوباً في منطقتك</h3>
        <div id="drivers-list"></div>
        <button onclick="closeModal()" style="margin-top:15px; cursor:pointer; background:none; border:none; color:#999;">إغلاق</button>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script src="firebase.js"></script>
<script>
const urlParams = new URLSearchParams(window.location.search);
const productId = String(urlParams.get('productId'));
let currentProduct = null;
const userRegion = localStorage.getItem("userRegion") || "";

// 1. جلب بيانات المنتج
database.ref("products").once("value").then(snap => {
    const data = snap.val() || {};
    currentProduct = Object.values(data).find(p => String(p.id) === productId);
    if(!currentProduct) return alert("المنتج غير موجود");

    document.getElementById("product-name").innerText = currentProduct.name;
    document.getElementById("product-price").innerText = currentProduct.price;
    document.getElementById("product-status").innerText = currentProduct.status;
    document.getElementById("product-store").innerText = currentProduct.store;
    document.getElementById("product-img").src = currentProduct.image;

    // فحص الطلبات النشطة بعد تحميل المنتج
    checkActiveOrder();
});

// 2. وظيفة فحص وجود طلب سابق
function checkActiveOrder() {
    const myName = localStorage.getItem("userName");
    database.ref("Orders").orderByChild("customer").equalTo(myName).once("value", snap => {
        const orders = snap.val();
        if (orders) {
            Object.values(orders).forEach(ord => {
                // إذا كان الطلب لنفس المنتج وحالته ليست "تم التوصيل"
                if (ord.pName === currentProduct.name && ord.status !== "delivered") {
                    document.getElementById("main-btn-group").innerHTML = `
                        <div style="background:#fff3e0; padding:15px; border-radius:12px; border:1px solid #e67e22; margin-bottom:10px;">
                            <p style="margin:0; font-size:14px; color:#e67e22;">لديك طلب نشط لهذا المنتج!</p>
                            <button class="btn-main" style="background:#e67e22; color:white; margin-top:10px;" 
                                onclick="location.href='track-order.html?orderId=${ord.id}'">
                                💬 تتبع الطلب والدردشة مع المندوب
                            </button>
                        </div>
                        <button class="btn-main btn-back" onclick="window.history.back()">رجوع</button>
                    `;
                }
            });
        }
    });
}

// 3. فتح قائمة المناديب
document.getElementById("order-delivery").onclick = () => {
    if(!userRegion) return alert("حدد منطقتك أولاً");
    document.getElementById("delivery-modal").style.display = "flex";
    const list = document.getElementById("drivers-list");
    list.innerHTML = "جاري البحث...";

    database.ref("Deliveries").orderByChild("region").equalTo(userRegion).once("value", snap => {
        list.innerHTML = "";
        const drivers = snap.val();
        if(!drivers) return list.innerHTML = "لا يوجد مناديب في منطقتك حالياً";
        
        Object.keys(drivers).forEach(phone => {
            const d = drivers[phone];
            const card = document.createElement("div");
            card.className = "driver-card";
            card.innerHTML = `
                <div style="text-align:right;"><b>${d.name}</b><br><small>${d.vehicle || 'توصيل سريع'}</small></div>
                <button class="btn-main" style="width:70px; padding:5px; font-size:12px; background:var(--gold); color:white;" 
                onclick="sendOrderToDriver('${phone}', '${d.name}')">طلب</button>
            `;
            list.appendChild(card);
        });
    });
};

// 4. إرسال الطلب وحفظه
// 4. إرسال الطلب وحفظه (بدون فتح واتساب)
function sendOrderToDriver(phone, name) {
    const orderID = "ORD-" + Date.now();
    const orderData = {
        id: orderID,
        pName: currentProduct.name,
        price: currentProduct.price,
        store: currentProduct.store,
        customer: localStorage.getItem("userName"),
        region: userRegion,
        driverPhone: phone,
        driverName: name, 
        status: "waiting",
        date: new Date().toLocaleString()
    };

    database.ref("Orders/" + orderID).set(orderData).then(() => {
        alert("تم إرسال الطلب للمندوب " + name + " بنجاح ✅");
        // نقوم بإعادة تحميل الصفحة ليظهر زر التتبع والدردشة بدلاً من أزرار الطلب
        location.reload(); 
    }).catch(err => {
        alert("خطأ في إرسال الطلب، يرجى المحاولة لاحقاً");
    });
}

function closeModal() { document.getElementById("delivery-modal").style.display = "none"; }
</script>
</body>
</html>
