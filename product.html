<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>تفاصيل المنتج - متاجر البلاد</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
    :root { --gold: #b89b4a; --dark: #1b1e33; --light: #f9f5f0; }
    body { margin: 0; font-family: "Segoe UI", Tahoma, sans-serif; background: linear-gradient(to bottom,#f9f5f0,#f0e8d0); color: #333; padding-bottom: 40px; }
    .product-card { background: #fff; border-radius: 20px; max-width: 500px; width: 95%; box-shadow: 0 10px 30px rgba(184, 155, 74, 0.2); overflow: hidden; margin: 20px auto; text-align: center; position: relative; }
    .img-wrapper { position: relative; width: 100%; background: #fdfdfd; }
    .product-img { width: 100%; aspect-ratio: 1 / 1; object-fit: contain; }
    .favorite-btn, .share-btn { position: absolute; top: 15px; background: white; border-radius: 50%; width: 45px; height: 45px; border: none; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.1); z-index: 10; display: flex; justify-content: center; align-items: center; font-size: 22px; transition: 0.3s; }
    .favorite-btn { left: 15px; color: #ccc; }
    .favorite-btn.active { color: #e74c3c; }
    .share-btn { right: 15px; color: var(--dark); }
    .related-section { margin-top: 20px; padding: 15px; text-align: right; }
    .related-title { font-size: 18px; font-weight: bold; color: var(--dark); border-right: 4px solid var(--gold); padding-right: 10px; margin-bottom: 15px; }
    .related-container { display: flex; gap: 12px; overflow-x: auto; padding-bottom: 10px; scrollbar-width: none; }
    .related-container::-webkit-scrollbar { display: none; }
    .related-card { min-width: 130px; background: white; border-radius: 12px; padding: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); cursor: pointer; text-align: center; }
    .related-img { width: 100%; aspect-ratio: 1/1; border-radius: 8px; object-fit: cover; }
    .related-name { font-size: 11px; font-weight: bold; margin-top: 5px; height: 30px; overflow: hidden; color: var(--dark); }
    .related-price { color: var(--gold); font-size: 11px; font-weight: bold; }
    .info-section { padding: 20px; }
    .product-name { font-size: 26px; font-weight: bold; color: #8b5e3c; margin-bottom: 10px; }
    .product-price { margin-bottom: 15px; }
    .detail-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px dashed #eee; font-size: 15px; }
    .btn-group { display: flex; flex-direction: column; gap: 12px; padding: 20px; }
    .btn-main { border: none; border-radius: 12px; padding: 15px; font-weight: bold; cursor: pointer; transition: 0.3s; display: flex; align-items: center; justify-content: center; gap: 10px; font-size: 16px; text-decoration: none; }
    .btn-wa { background: #25D366; color: white; }
    .btn-delivery { background: #e67e22; color: white; }
    .btn-back { background: #eee; color: #666; }
    .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 9999; justify-content: center; align-items: center; }
    .modal-content { background: white; width: 90%; max-width: 400px; padding: 25px; border-radius: 20px; text-align: center; max-height: 80vh; overflow-y: auto; }
    .driver-card { background: #f8f9fa; border-right: 5px solid var(--gold); padding: 12px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; border-radius: 8px; }
</style>
</head>
<body>

<div class="product-card">
    <div class="img-wrapper">
        <button class="favorite-btn" id="favBtn">❤</button>
        <button class="share-btn" onclick="copyLink()">🔗</button> 
        <img src="" class="product-img" id="product-img">
    </div>
    <div class="info-section">
        <div class="product-name" id="product-name">جاري التحميل...</div>
        <div id="product-price">--</div>
        <div class="detail-row"><span>الحالة:</span><b id="product-status">--</b></div>
        <div class="detail-row"><span>المتجر:</span><b id="product-store">--</b></div>
    </div>
    <div class="btn-group" id="main-btn-group">
        <button class="btn-main btn-wa" id="order-wa">🟢 طلب مباشر عبر واتساب</button>
        <button class="btn-main btn-delivery" id="order-delivery">🛵 طلب عبر مندوب (منطقتي)</button>
        <button class="btn-main btn-back" onclick="window.history.back()">رجوع للخلف</button>
    </div>
    <div class="related-section">
        <div class="related-title">منتجات قد تعجبك 🛍️</div>
        <div id="related-list" class="related-container"></div>
    </div>
</div>

<div id="delivery-modal" class="modal">
    <div class="modal-content">
        <h3>اختر مندوباً في منطقتك</h3>
        <p style="font-size:11px; color:#27ae60;" id="gps-status">📍 جاري محاولة تحديد موقعك للدقة...</p>
        <div id="drivers-list"></div>
        <button onclick="closeModal()" style="margin-top:15px; cursor:pointer; background:#eee; border:none; padding:10px 20px; border-radius:10px;">إغلاق</button>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script src="firebase.js"></script>
<script>
const urlParams = new URLSearchParams(window.location.search);
const productId = String(urlParams.get('productId'));
let currentProduct = null;
const userRegion = localStorage.getItem("userRegion") || "";
const FCM_SERVER_KEY = "AIzaSyAMEoUTIMAS0mh06_SxrM2T_efDxEmEoxg"; 

// 1. تحميل المنتج
database.ref("products").once("value").then(snap => {
    const data = snap.val() || {};
    currentProduct = Object.values(data).find(p => String(p.id) === productId);
    if(!currentProduct) return alert("المنتج غير موجود");

    document.getElementById("product-name").innerText = currentProduct.name;
    document.getElementById("product-status").innerText = currentProduct.status;
    document.getElementById("product-store").innerText = currentProduct.store;
    document.getElementById("product-img").src = currentProduct.image || "no-image.png";

    const isFlashActive = currentProduct.isFlash && currentProduct.flashExpiry > Date.now();
    if (isFlashActive) {
        document.getElementById("product-price").innerHTML = `<div style="color:red; font-size:26px; font-weight:bold;">⚡ ${currentProduct.flashPrice} ريال</div>`;
    } else {
        document.getElementById("product-price").innerHTML = `<div style="font-size:22px; font-weight:bold; color:var(--gold);">${currentProduct.price} ريال</div>`;
    }
    initFavorite(); checkActiveOrder(); loadRelatedProducts(currentProduct);
});

// 2. زر المندوب (المزاد) - التعديل الجذري هنا
document.getElementById("order-delivery").onclick = () => {
    const userName = localStorage.getItem("userName");
    if(!userName) return alert("يرجى تسجيل الدخول");

    // توليد ID موحد يبدأ بـ ORD
    const orderID = "ORD-" + Date.now(); 

    const orderData = {
        id: orderID,
        customer: userName,
        pName: document.getElementById("product-name").innerText,
        price: document.getElementById("product-price").innerText,
        region: userRegion,
        status: "waiting",
        driverPhone: "none",
        timestamp: Date.now()
    };

    // استخدام .set لضمان أن اسم المجلد هو الـ ID نفسه وليس كود عشوائي
    database.ref("Orders/" + orderID).set(orderData).then(() => {
        alert("تم إرسال طلبك! رقم الطلب: " + orderID);
        checkActiveOrder(); // تحديث الأزرار فوراً لزر الدردشة
    });
};

// 3. فحص الطلبات النشطة لعرض زر الدردشة
function checkActiveOrder() {
    const myName = localStorage.getItem("userName");
    if(!myName || !currentProduct) return;

    database.ref("Orders").orderByChild("customer").equalTo(myName).on("value", snap => {
        const orders = snap.val();
        if (orders) {
            Object.keys(orders).forEach(key => {
                const ord = orders[key];
                // إذا كان نفس المنتج ولم يتم تسليمه بعد
                if (ord.pName === currentProduct.name && ord.status !== "delivered") {
                    document.getElementById("main-btn-group").innerHTML = `
                        <div style="background:#fff3e0; padding:15px; border-radius:12px; border:1.5px solid #e67e22; margin-bottom:10px;">
                            <p style="margin:0; font-size:14px; color:#e67e22; font-weight:bold;">لديك طلب نشط!</p>
                            <button class="btn-main" style="background:#e67e22; color:white; margin-top:10px;" 
                                onclick="location.href='track-order.html?orderId=${ord.id}'">💬 تتبع الطلب والدردشة</button>
                        </div>
                        <button class="btn-main btn-back" onclick="window.history.back()">رجوع</button>`;
                }
            });
        }
    });
}

// دالة الواتساب
document.getElementById("order-wa").onclick = () => {
    const message = `أرجو شراء المنتج: ${currentProduct.name}\nالسعر: ${currentProduct.price}\nالمتجر: ${currentProduct.store}`;
    window.open(`https://wa.me/967774257557?text=${encodeURIComponent(message)}`, '_blank');
};

function initFavorite() { /* كود المفضلة */ }
function loadRelatedProducts(currentP) { /* كود المنتجات ذات الصلة */ }
function copyLink() { navigator.clipboard.writeText(window.location.href); alert("تم نسخ الرابط"); }
</script>
</body>
</html>
