<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>الدخول - متاجر البلاد</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script src="firebase.js"></script>

<script>
  // ✅ فحص التجاوز التلقائي
  if(localStorage.getItem("userName") && localStorage.getItem("introShown") === "true"){
      window.location.replace("fields.html"); 
  }
</script>

<link href="https://fonts.googleapis.com/css2?family=Lateef&display=swap" rel="stylesheet">

<style>
    body { margin: 0; font-family: "Segoe UI", sans-serif; background: #1c1f33; height: 100vh; display: flex; justify-content: center; align-items: center; color: white; }
    .box { background: #ffffff; padding: 30px; border-radius: 22px; width: 90%; max-width: 400px; text-align: center; color: #333; }
    .welcome-line2 { font-family: 'Lateef', cursive; font-size: 38px; color: #bfa14a; font-weight: bold; }
    input { width:100%; padding:13px; margin-bottom:16px; border-radius:12px; border:1px solid #ddd; box-sizing: border-box; }
    .btn-main { width:100%; padding:14px; border:none; border-radius:16px; font-size:18px; font-weight:bold; cursor:pointer; background: #bfa14a; color: white; }
    .old-user-link { display: block; margin-top: 15px; font-size: 13px; color: #888; cursor: pointer; text-decoration: underline; }
</style>
</head>
<body>

<div class="box">
    <div class="welcome-line2">متاجر البلاد</div>
    <p>أدخل اسمك الرباعي للمتابعة</p>
    
    <input type="text" id="name" placeholder="الاسم الرباعي">
    <input type="text" id="region" placeholder="المنطقة (مثال: سيئون - القرن)">
    
    <button class="btn-main" onclick="go()">دخول 🚀</button>
    <span class="old-user-link" onclick="loginOldUser()">لدي حساب سابق </span>
    <div id="loader" style="display:none; color: #bfa14a; margin-top: 10px;">جاري الفحص...</div>
</div>

<script>
function go(){
    const name = document.getElementById("name").value.trim();
    const region = document.getElementById("region").value.trim();

    if(name.length < 10){ alert("يرجى كتابة الاسم الرباعي كاملاً"); return; }
    if(!region){ alert("يرجى كتابة المنطقة"); return; }

    localStorage.setItem("userName", name);
    localStorage.setItem("userRegion", region);
    
    // حفظ في داتابيز لضمان وجود الحساب مستقبلاً
    database.ref("Users/" + name).update({
        region: region,
        lastLogin: Date.now()
    }).then(() => {
        location.href = "intro.html";
    });
}

function loginOldUser() {
    const name = document.getElementById("name").value.trim();
    if(!name) { alert("اكتب اسمك القديم أولاً في الخانة"); return; }
    document.getElementById("loader").style.display = "block";

    // محاولة جلب البيانات بالاسم
    database.ref("Users/" + name).once("value").then(snap => {
        if(snap.exists()) {
            const d = snap.val();
            localStorage.setItem("userName", name);
            localStorage.setItem("userRegion", d.region);
            localStorage.setItem("introShown", "true");
            alert("أهلاً بك مجدداً يا " + name);
            window.location.href = "fields.html";
        } else {
            alert("الاسم غير موجود، تأكد من كتابته بدقة أو سجل كجديد");
            document.getElementById("loader").style.display = "none";
        }
    });
}
</script>
</body>
</html>
