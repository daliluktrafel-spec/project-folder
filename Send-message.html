<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>إدارة تقارير التجار - متاجر البلاد</title>
    <style>
        :root { --gold: #b89b4a; --dark: #1b1e33; --light: #f7f6f2; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--light); margin: 0; padding: 20px; color: var(--dark); }
        .container { max-width: 900px; margin: auto; }
        h1 { text-align: center; color: var(--dark); border-bottom: 3px solid var(--gold); padding-bottom: 10px; }
        .merchant-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 15px; margin-bottom: 30px; }
        .merchant-card { background: white; padding: 15px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); cursor: pointer; transition: 0.3s; border: 1px solid transparent; }
        .merchant-card:hover { border-color: var(--gold); transform: translateY(-3px); }
        .merchant-card.active { background: var(--gold); color: white; }
        .report-section { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); display: none; }
        .report-section.show { display: block; animation: fadeIn 0.5s; }
        textarea { width: 100%; height: 250px; padding: 15px; border-radius: 10px; border: 1px solid #ccc; font-size: 16px; font-family: inherit; line-height: 1.6; resize: vertical; margin-top: 15px; }
        .actions { display: flex; gap: 15px; margin-top: 20px; }
        .btn { flex: 1; padding: 15px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 16px; transition: 0.3s; }
        .btn-generate { background: var(--dark); color: white; }
        .btn-send { background: #25D366; color: white; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .loading { font-style: italic; color: var(--gold); }
    </style>
</head>
<body>

<div class="container">
    <h1>🚀 إدارة تقارير التجار الذكية</h1>
    <div id="merchants-grid" class="merchant-list"></div>

    <div id="report-area" class="report-section">
        <h3 id="target-merchant">تقرير متجر: ...</h3>
        <p id="status-msg" class="loading"></p>
        <textarea id="ai-text-area" placeholder="الرسالة ستظهر هنا..."></textarea>
        <div class="actions">
            <button class="btn btn-generate" id="btn-retry">🔄 إعادة توليد بالذكاء</button>
            <button class="btn btn-send" id="btn-whatsapp">📲 إرسال عبر واتساب</button>
        </div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script src="firebase.js"></script>

<script type="module">
    // استيراد القائمة من ملفك الخارجي
    import merchantsList from './merchants.js'; 

    let selectedMerchant = null;

    // توليد البطاقات من القائمة المستوردة
    const grid = document.getElementById('merchants-grid');
    merchantsList.forEach(m => {
        // نظهر فقط التجار النشطين (الذين ليسوا "لداعي السرية")
        if(m.active) {
            const div = document.createElement('div');
            div.className = 'merchant-card';
            div.innerHTML = `<strong>${m.storeName}</strong><br><small>${m.ownerName}</small>`;
            div.onclick = () => selectMerchant(m, div);
            grid.appendChild(div);
        }
    });

    async function selectMerchant(merchant, element) {
        selectedMerchant = merchant;
        document.querySelectorAll('.merchant-card').forEach(c => c.classList.remove('active'));
        element.classList.add('active');
        document.getElementById('report-area').classList.add('show');
        document.getElementById('target-merchant').innerText = `تقرير متجر: ${merchant.storeName}`;
        document.getElementById('ai-text-area').value = "";
        await prepareReport();
    }

    async function prepareReport() {
        if(!selectedMerchant) return;
        const status = document.getElementById('status-msg');
        status.innerText = "⏳ جاري تحليل مبيعات الفايربيس وصياغة الرسالة...";
        
        try {
            const stats = await generateMerchantReport(selectedMerchant.ownerName);
            const message = await craftAIWhatsAppMessage(selectedMerchant, stats);
            document.getElementById('ai-text-area').value = message;
            status.innerText = "✅ تم تجهيز التقرير بنجاح.";
        } catch (e) {
            status.innerText = "❌ حدث خطأ أثناء التحليل.";
            console.error(e);
        }
    }

    // جعل الدوال متاحة للأزرار لأننا داخل Module
    document.getElementById('btn-retry').onclick = prepareReport;
    document.getElementById('btn-whatsapp').onclick = () => {
        const text = document.getElementById('ai-text-area').value;
        const url = `https://web.whatsapp.com/send?phone=${selectedMerchant.phone}&text=${encodeURIComponent(text)}`;
        window.open(url, '_blank');
    };

    // --- الدوال الأساسية (بقيت كما هي) ---
   async function generateMerchantReport(merchantName) {
   
    const snapshot = await database.ref("Orders").once("value"); 
    const allOrders = snapshot.val() ? Object.values(snapshot.val()) : [];
    const successfulOrders = allOrders.filter(order => order.status === "picked");
       let reportData = { topProducts: {}, totalRevenue: 0, regions: {}, totalOrders: successfulOrders.length };
        successfulOrders.forEach(order => {
            reportData.topProducts[order.pName] = (reportData.topProducts[order.pName] || 0) + 1;
            reportData.regions[order.region] = (reportData.regions[order.region] || 0) + 1;
            const priceValue = parseInt(order.price.replace(/[^\d]/g, '')) || 0;
            reportData.totalRevenue += priceValue;
        });
        return reportData;
    }

   async function craftAIWhatsAppMessage(merchantData, reportData) {
        // تجهيز ملخص البيانات ليقرأه الذكاء الاصطناعي
        const statsSummary = `
            التاجر: ${merchantData.ownerName}
            المتجر: ${merchantData.storeName}
            عدد الطلبات الناجحة: ${reportData.totalOrders}
            إجمالي الدخل: ${reportData.totalRevenue} ريال
            المنتجات المباعة تكرارها: ${JSON.stringify(reportData.topProducts)}
            المناطق: ${JSON.stringify(reportData.regions)}
        `;

        try {
            const response = await fetch("/api/chat", { 
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    model: "llama-3.3-70b-versatile",
                    messages: [
                        { 
                            role: "system", 
                            content: `أنت خبير تحليل مبيعات في منصة "متاجر البلاد". 
                            مهمتك كتابة تقرير أسبوعي للتاجر بالهجة اليمنية الحبيبة.
                            يجب أن تلتزم بهذا القالب تماماً:

                            حياك الله يا [اسم التاجر] ([اسم المتجر]) 🌸
                            إليك تقريرك الذكي من منصة متاجر البلاد:
                            ✅ الأكثر طلباً: [اذكر المنتج الأكثر تكراراً] (اكتب تعليق تشجيعي قصير).
                            ⚠️ منتج راكد: [اختر منتجاً لم يذكر في المبيعات أو مبيعاته 1 فقط] (انصحه بعمل خصم أو تحسين عرضه).
                            💡 نصيحة البلاد: [اعطه نصيحة تجارية بناءً على منطقته أو مبيعاته].
                            مستمرون بدعم نجاحك! 🚀

                            ملاحظات صرامة:
                            1. لا تضف أي مقدمات خارج القالب.
                            2. استخدم الرموز التعبيرية (Emojis) كما في القالب.
                            3. اللهجة يجب أن تكون يمنية محترمة (يا غالي، يا صاحب المتجر، بارك الله فيك).` 
                        },
                        { role: "user", content: `حلل هذه البيانات واصنع الرسالة: ${statsSummary}` }
                    ]
                })
            });

            if (!response.ok) {
                throw new Error('API Response not OK');
            }

            const data = await response.json();
            // التأكد من جلب نص الرسالة فقط
            return data.choices[0].message.content;

        } catch (error) {
            console.error("Error in AI Message:", error);
            return `حياك الله يا ${merchantData.ownerName}.. مبيعاتك هذا الأسبوع بلغت ${reportData.totalOrders} طلبات ناجحة بإجمالي ${reportData.totalRevenue} ريال. (حدث خطأ في جلب النصيحة الذكية).`;
        }
    }
</script>
</body>
</html>
