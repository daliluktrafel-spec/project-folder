<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>دخول المتجر - متاجر البلاد</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root { --gold: #b89b4a; --dark: #1b1e33; }
        body { 
            margin: 0; font-family: 'Cairo', sans-serif; 
            background: linear-gradient(135deg, #f7f6f2 0%, #d1c7a3 100%);
            display: flex; justify-content: center; align-items: center; height: 100vh; 
        }
        .login-box { 
            background: white; padding: 40px 30px; border-radius: 25px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.1); width: 90%; max-width: 350px; 
            text-align: center; border-top: 5px solid var(--gold);
        }
        .login-box h2 { color: var(--dark); margin-bottom: 5px; font-size: 22px; }
        .store-tag { color: var(--gold); font-weight: bold; margin-bottom: 25px; display: block; }
        .login-box input { 
            width: 100%; padding: 15px; margin: 10px 0; border: 2px solid #eee; 
            border-radius: 12px; box-sizing: border-box; outline: none; font-size: 16px; transition: 0.3s;
            text-align: center;
        }
        .login-box input:focus { border-color: var(--gold); }
        .login-box button { 
            width: 100%; padding: 15px; background: var(--dark); color: white; 
            border: none; border-radius: 12px; cursor: pointer; font-weight: bold; font-size: 16px; margin-top: 15px;
        }
        .login-box button:hover { background: #2c2f4a; transform: translateY(-2px); }
        #error-msg { color: #e74c3c; font-size: 14px; margin-top: 15px; font-weight: bold; }
    </style>
</head>
<body>

<div class="login-box">
    <h2>تسجيل الدخول</h2>
    <span id="store-name" class="store-tag">اسم المتجر</span>
    <input type="password" id="password" placeholder="أدخل كلمة السر الخاصة بمتجرك">
    <button id="login-btn">دخول للوحة التحكم</button>
    <div id="error-msg"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script src="firebase.js"></script>

<script>
    const storeName = localStorage.getItem("selectedStore");
    const rawIdentifier = localStorage.getItem("storeID");
    const storeType = localStorage.getItem("storeType"); // 'new' or 'old'
    
    // تنظيف المعرف من أي مسافات أو رموز غير مرئية
    const identifier = rawIdentifier ? rawIdentifier.replace(/[\s\u2066\u2067\u2068\u2069]/g, '').trim() : null;

    if (!storeName || !identifier) {
        window.location.href = "stores.html";
    }

    document.getElementById("store-name").innerText = "🏪 " + storeName;

    document.getElementById("login-btn").onclick = () => {
        const inputPass = document.getElementById("password").value.trim();
        const errorMsg = document.getElementById("error-msg");

        if(!inputPass) {
            errorMsg.innerText = "⚠️ يرجى إدخال كلمة السر";
            return;
        }

        errorMsg.innerText = "⏳ جاري التحقق من الهوية...";

        if (storeType === "new") {
            // جلب كل المتاجر والبحث بداخلها يدوياً لتجنب مشاكل المسافات في قاعدة البيانات
            database.ref(`Active_Stores`).once("value").then(snap => {
                let foundStore = null;
                if(snap.exists()){
                    snap.forEach(child => {
                        // تنظيف المفتاح الحالي في القاعدة من المسافات للمقارنة
                        let cleanKey = child.key.replace(/[\s\u2066\u2067\u2068\u2069]/g, '').trim();
                        if(cleanKey === identifier) {
                            foundStore = child.val();
                        }
                    });

                    if(foundStore) {
                        if(String(inputPass) === String(foundStore.password).trim()) {
                            loginSuccess();
                        } else {
                            errorMsg.innerText = "❌ كلمة السر خاطئة!";
                        }
                    } else {
                        errorMsg.innerText = "❌ لم يتم العثور على بيانات المتجر";
                    }
                }
            });
        } 
        else {
            // النظام القديم (storePasswords)
            database.ref(`storePasswords/${storeName}`).once("value").then(oldSnap => {
                if(oldSnap.exists()){
                    if(String(inputPass) === String(oldSnap.val()).trim()) {
                        loginSuccess();
                    } else {
                        errorMsg.innerText = "❌ كلمة السر خاطئة!";
                    }
                } else {
                    errorMsg.innerText = "❌ المتجر غير مسجل في النظام القديم";
                }
            });
        }
    };

    function loginSuccess() {
        localStorage.setItem("storeLoggedIn", "true");
        localStorage.setItem("selectedStore", storeName);
        document.getElementById("error-msg").style.color = "green";
        document.getElementById("error-msg").innerText = "✅ تم التحقق.. جاري الدخول";
        setTimeout(() => { window.location.href = "dashboard.html"; }, 500);
    }
</script>
</body>
</html>
