<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>إضافة مناديب | القائد حسين</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 50px; background: #1b1e33; color: white; }
        input { padding: 10px; margin: 10px; border-radius: 5px; width: 250px; }
        button { padding: 10px 20px; background: #b89b4a; border: none; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <h2>🚚 إضافة مندوب جديد للنظام</h2>
    <input type="text" id="d-name" placeholder="اسم المندوب"><br>
    <input type="tel" id="d-phone" placeholder="رقم الهاتف (بدون مفتاح)"><br>
    <input type="text" id="d-region" placeholder="المنطقة (مطابقة لمنطقة الزبائن)"><br>
    <input type="text" id="d-vehicle" placeholder="نوع المركبة (موتر/سيارة)"><br>
    <button onclick="addDriver()">إضافة المندوب الآن</button>

    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <script src="firebase.js"></script>
    <script>
        function addDriver() {
            const phone = document.getElementById("d-phone").value;
            const data = {
                name: document.getElementById("d-name").value,
                region: document.getElementById("d-region").value,
                vehicle: document.getElementById("d-vehicle").value,
                status: "active"
            };
            database.ref("Deliveries/" + phone).set(data).then(() => alert("تمت الإضافة!"));
        }
    </script>
</body>
</html>
