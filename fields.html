<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>متاجر البلاد - الأقسام</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">

<style>
    body { margin: 0; font-family: 'Cairo', sans-serif; background-color: #f7f6f2; overflow-x: hidden; }

    /* تطوير شريط التنقل ليكون عائماً قليلاً */
    .top-navbar { 
        display: flex; justify-content: space-around; align-items: center; 
        background: linear-gradient(45deg, #1b1e33, #252943); /* خلفية داكنة فخمة */
        padding: 10px 0; position: sticky; top: 0; z-index: 1000; 
        box-shadow: 0 4px 20px rgba(0,0,0,0.3); 
    }

    .nav-link { 
        color: #ffffff; text-decoration: none; text-align: center; flex: 1; 
        font-size: 12px; font-weight: bold; cursor: pointer; 
        transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); /* حركة مرنة */
        opacity: 0.6; position: relative; 
    }

    /* تأثير ضخم عند مرور الماوس (Hover) أو الإصبع */
    .nav-link:hover { 
        opacity: 1; 
        transform: translateY(-5px) scale(1.1); /* ترتفع للأعلى وتكبر */
        color: #b89b4a; 
    }

    /* تأثير "النبض" المستمر للأيقونة النشطة */
    .nav-link.active { 
        opacity: 1; 
        color: #b89b4a; 
        transform: scale(1.15); 
    }
    
    .nav-link.active span:first-child {
        display: inline-block;
        animation: bounce 2s infinite; /* اهتزاز مستمر للأيقونة النشطة */
    }

    /* تأثير عند الضغط الفعلي (Active Click) */
    .nav-link:active {
        transform: scale(0.8); /* تصغر فجأة ثم تكبر لتعطي إحساس الضغط الحقيقي */
        filter: brightness(1.5);
    }

    /* زخرفة تحت الأيقونة النشطة */
    .nav-link.active::after {
        content: ''; position: absolute; bottom: -10px; left: 25%; width: 50%; height: 3px;
        background: #b89b4a; border-radius: 10px;
        box-shadow: 0 0 10px #b89b4a;
    }

    .notif-badge { 
        position: absolute; top: -5px; right: 20%; background-color: #e74c3c; 
        color: white; font-size: 10px; padding: 2px 7px; border-radius: 10px; 
        border: 2px solid #1b1e33; animation: pulse 1.5s infinite; 
    }

    #main-frame { width: 100%; height: calc(100vh - 70px); border: none; display: block; background: #f7f6f2; }

    /* الأنيميشن الخاص بالاهتزاز والنبض */
    @keyframes bounce {
        0%, 20%, 50%, 80%, 100% {transform: translateY(0);}
        40% {transform: translateY(-7px);}
        60% {transform: translateY(-4px);}
    }

    @keyframes pulse {
        0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(231, 76, 60, 0.7); }
        70% { transform: scale(1.2); box-shadow: 0 0 0 10px rgba(231, 76, 60, 0); }
        100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(231, 76, 60, 0); }
    }
</style>
</head>
<body>

<div class="top-navbar">
    <div class="nav-link active" onclick="loadPage('home.html', this)">
        <span>🏠</span><br>الرئيسية
    </div>
    <div class="nav-link" onclick="loadPage('notifications.html', this); markAsRead();">
        <span id="notif-dot" class="notif-badge">!</span>
        <span>🔔</span><br>الإشعارات
    </div>
    <div class="nav-link" onclick="loadPage('contact.html', this)">
        <span>📞</span><br>اتصل بنا
    </div>
    <div class="nav-link" onclick="loadPage('create-store.html', this)">
        <span>🏪</span><br>إنشاء متجر
    </div>
</div>

<iframe src="home.html" id="main-frame" name="main-frame"></iframe>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script src="firebase.js"></script>

<script>
    // 1. دالة تحميل الصفحات
    function loadPage(pageUrl, element) {
        document.getElementById('main-frame').src = pageUrl;
        document.querySelectorAll('.nav-link').forEach(link => link.classList.remove('active'));
        element.classList.add('active');
    }

    // 2. فحص الإشعارات
    function checkNewNews() {
        const database = firebase.database();
        database.ref("news").on("value", snap => {
            const data = snap.val();
            if (!data) return;
            const newsCount = Object.keys(data).length;
            const lastSeen = localStorage.getItem("lastSeenNewsCount") || 0;
            if (newsCount > lastSeen) document.getElementById("notif-dot").style.display = "block";
        });
    }

    // 3. دالة قراءة الإشعارات
    function markAsRead() {
        firebase.database().ref("news").once("value", snap => {
            if (snap.val()) {
                localStorage.setItem("lastSeenNewsCount", Object.keys(snap.val()).length);
                document.getElementById("notif-dot").style.display = "none";
            }
        });
    }

    // 4. التشغيل عند فتح الصفحة (دمج كل الوظائف)
    window.onload = function() {
    checkNewNews();

    // فحص إذا فاز بـ 500 ريال مؤخراً
    if (localStorage.getItem("won500") === "true") {
        const msg = document.createElement("div");
        msg.style = "position:fixed; top:80px; left:5%; width:90%; background:#d45d5d; color:white; padding:15px; border-radius:15px; z-index:10000; text-align:center; font-weight:bold; box-shadow:0 5px 15px rgba(0,0,0,0.3);";
        msg.innerHTML = "🎁 مبروك! لديك مكافأة 500 ر.ي بانتظار موافقة الإشراف لاستخدامها في مشترياتك";
        document.body.appendChild(msg);
        
        setTimeout(() => { 
            msg.style.display = "none"; 
            localStorage.removeItem("won500"); // حذفها لكي لا تظهر دائماً
        }, 5000);
    }

    // منطق العجلة كل 24 ساعة
    const lastSpin = localStorage.getItem("lastSpinTime");
    const now = Date.now();
    if (localStorage.getItem("introShown") === "true") {
        if (!lastSpin || (now - lastSpin >= 86400000)) {
            setTimeout(() => { window.location.href = "lucky-wheel.html"; }, 5000);
        }
    }
};
    // حل مشكلة الارتفاع
    window.addEventListener('reize', function() {
        document.getElementById('main-frame').style.height = (window.innerHeight - 70) + "px";
    });
</script>
</body>
</html>
