<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>الإدارة العليا - متاجر البلاد</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
    :root { --gold: #b89b4a; --dark: #1b1e33; --bg: #f4f7f6; --success: #27ae60; --danger: #e74c3c; }
    body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; }
    .header { background: var(--dark); color: white; padding: 20px; text-align: center; }
    .container { max-width: 800px; margin: 20px auto; padding: 10px; }
    .card { background: white; border-radius: 15px; padding: 20px; margin-bottom: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); border-right: 5px solid var(--gold); }
    .info { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 10px 0; font-size: 14px; }
    .btns { display: flex; gap: 10px; margin-top: 15px; }
    .btn { flex: 1; padding: 10px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; color: white; }
    .approve { background: var(--success); }
    .reject { background: var(--danger); }
    #lock { position: fixed; top:0; left:0; width:100%; height:100%; background: var(--dark); z-index: 999; display: flex; flex-direction: column; justify-content: center; align-items: center; }
    input { padding: 12px; border-radius: 8px; border: none; margin-bottom: 10px; width: 200px; text-align: center; }
</style>
</head>
<body>

<div id="lock">
    <h2 style="color:white;">🔐 غرفة العمليات - حسين</h2>
    <input type="password" id="pass" placeholder="رمز الدخول السرّي">
    <button class="btn approve" style="flex:none; width:100px;" onclick="unlock()">دخول</button>
</div>

<div class="header">
    <h1>إدارة طلبات المتاجر</h1>
    <p>طلبات بانتظار المراجعة: <span id="count">0</span></p>
</div>

<div class="container" id="list"></div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAMEoUTIMAS0mh06_SxrM2T_efDxEmEoxg",
        databaseURL: "https://wafaseiyunshop-default-rtdb.firebaseio.com"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    function unlock() {
        if(document.getElementById("pass").value === "7742575571100") { // غير كلمة السر هنا
            document.getElementById("lock").style.display = "none";
            loadRequests();
        } else { alert("الرمز خطأ!"); }
    }

    function loadRequests() {
        db.ref("Pending_Stores").on("value", snap => {
            const list = document.getElementById("list");
            list.innerHTML = "";
            let data = snap.val();
            if(!data) { list.innerHTML = "<p style='text-align:center;'>لا توجد طلبات جديدة حالياً.</p>"; return; }
            
            document.getElementById("count").innerText = Object.keys(data).length;
            Object.keys(data).forEach(key => {
                let s = data[key];
                list.innerHTML += `
                    <div class="card">
                        <h3>🏪 ${s.bizName}</h3>
                        <div class="info">
                            <div>👤 المالك: ${s.ownerName}</div>
                            <div>📍 المنطقة: ${s.storeRegion}</div>
                            <div>📱 هاتف: ${s.ownerPhone}</div>
                            <div>🛠️ تخصص: ${s.mainSkill}</div>
                        </div>
                        <p style="font-size:13px; color:#666;">📝 ${s.projDesc}</p>
                        <div class="btns">
                            <button class="btn approve" onclick="approve('${key}')">✅ موافقة</button>
                            <button class="btn reject" onclick="reject('${key}')">❌ رفض</button>
                        </div>
                    </div>
                `;
            });
        });
    }

    function approve(key) {
        db.ref("Pending_Stores/" + key).once("value", snap => {
            let data = snap.val();
            let generatedPass = "ALB-" + Math.floor(1000 + Math.random() * 9000);
            
            // نقله للمقبولين برقم هاتفه كمعرف
            db.ref("Active_Stores/" + data.ownerPhone).set({
                ...data,
                password: generatedPass,
                status: "active"
            }).then(() => {
                db.ref("Pending_Stores/" + key).remove();
                alert("تم القبول! كلمة السر المرسلة للتاجر: " + generatedPass);
            });
        });
    }

    function reject(key) {
        if(confirm("هل أنت متأكد من رفض الطلب؟")) {
            db.ref("Pending_Stores/" + key).remove();
        }
    }
</script>
</body>
</html>
