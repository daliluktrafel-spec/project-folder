<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>غرفة العمليات - إدارة متاجر البلاد</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
    :root { --gold: #b89b4a; --dark: #1b1e33; --bg: #f4f7f6; --success: #27ae60; --danger: #e74c3c; }
    body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding-bottom: 50px; }
    .header { background: var(--dark); color: white; padding: 30px 20px; text-align: center; border-bottom: 5px solid var(--gold); }
    .container { max-width: 900px; margin: 20px auto; padding: 10px; }
    
    .card { background: white; border-radius: 20px; padding: 20px; margin-bottom: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); position: relative; border-right: 8px solid var(--gold); }
    .card-header { display: flex; align-items: center; gap: 15px; margin-bottom: 15px; border-bottom: 1px solid #eee; padding-bottom: 10px; }
    .store-logo { width: 60px; height: 60px; border-radius: 12px; object-fit: cover; background: #eee; border: 1px solid #ddd; }
    
    .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; font-size: 14px; color: #444; }
    .info-item b { color: var(--dark); display: block; margin-bottom: 2px; }
    
    .tags-container { margin-top: 10px; }
    .tag { background: #f0f0f0; color: #555; padding: 4px 10px; border-radius: 8px; font-size: 12px; margin-left: 5px; display: inline-block; border: 1px solid #ddd; }
    
    .desc-box { background: #f9f9f9; padding: 12px; border-radius: 12px; font-size: 13px; color: #666; margin-top: 15px; line-height: 1.6; border-left: 3px solid #ddd; }
    
    .btns { display: flex; gap: 10px; margin-top: 20px; }
    .btn { flex: 1; padding: 14px; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; transition: 0.3s; font-size: 15px; }
    .approve { background: var(--success); color: white; }
    .reject { background: #fff; color: var(--danger); border: 2px solid var(--danger); }
    .btn:hover { transform: translateY(-3px); opacity: 0.9; }

    #lock { position: fixed; top:0; left:0; width:100%; height:100%; background: var(--dark); z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center; }
    .lock-input { padding: 15px; border-radius: 12px; border: none; margin-bottom: 15px; width: 250px; text-align: center; font-size: 18px; letter-spacing: 5px; }
    
    .stats-bar { display: flex; justify-content: space-around; background: white; padding: 15px; border-radius: 15px; margin-bottom: 20px; font-weight: bold; color: var(--dark); }
</style>
</head>
<body>

<div id="lock">
    <h2 style="color:white; margin-bottom:20px;">🔐 لوحة تحكم القائد حسين</h2>
    <input type="password" id="pass" class="lock-input" placeholder="رمز الدخول">
    <button class="btn approve" style="flex:none; width:150px;" onclick="unlock()">دخول النظام</button>
</div>

<div class="header">
    <h1>مراجعة طلبات الانضمام</h1>
    <p>مرحباً بك يا حسين، راجع المتاجر بدقة قبل التفعيل</p>
</div>

<div class="container">
    <div class="stats-bar">
        <span>الطلبات الجديدة: <span id="count" style="color:var(--danger);">0</span></span>
        <span>تاريخ اليوم: <span id="today-date">--</span></span>
    </div>

    <div id="list">
        <p style="text-align:center; color:#888;">جاري تحميل الطلبات...</p>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAMEoUTIMAS0mh06_SxrM2T_efDxEmEoxg",
        databaseURL: "https://wafaseiyunshop-default-rtdb.firebaseio.com"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    document.getElementById("today-date").innerText = new Date().toLocaleDateString('ar-YE');

    function unlock() {
        if(document.getElementById("pass").value === "7742575571100") {
            document.getElementById("lock").style.display = "none";
            loadRequests();
        } else {
            alert("الرمز غير صحيح، حاول مرة أخرى.");
        }
    }

    function loadRequests() {
        db.ref("Pending_Stores").on("value", snap => {
            const listDiv = document.getElementById("list");
            listDiv.innerHTML = "";
            let data = snap.val();
            
            if(!data) {
                listDiv.innerHTML = "<div style='text-align:center; padding:50px;'>☕ لا توجد طلبات جديدة حالياً. استرخِ قليلاً!</div>";
                document.getElementById("count").innerText = "0";
                return;
            }
            
            const keys = Object.keys(data);
            document.getElementById("count").innerText = keys.length;

            keys.forEach(key => {
                let s = data[key];
                // معالجة التخصصات الفرعية إذا كانت موجودة
                let subSkillsHtml = "";
                if(s.subSkills && Array.isArray(s.subSkills)) {
                    s.subSkills.forEach(skill => {
                        subSkillsHtml += `<span class="tag">${skill}</span>`;
                    });
                }

                listDiv.innerHTML += `
                    <div class="card">
                        <div class="card-header">
                            <img src="${s.logo || 'no-logo.png'}" class="store-logo">
                            <div>
                                <h3 style="margin:0; color:var(--dark);">${s.bizName}</h3>
                                <small style="color:var(--gold);">بتاريخ: ${s.date || 'غير محدد'}</small>
                            </div>
                        </div>
                        
                        <div class="info-grid">
                            <div class="info-item"><b>👤 اسم المالك</b> ${s.ownerName}</div>
                            <div class="info-item"><b>📍 المنطقة</b> ${s.storeRegion}</div>
                            <div class="info-item"><b>📱 رقم الواتساب</b> ${s.ownerPhone}</div>
                            <div class="info-item"><b>🛠️ التخصص الرئيسي</b> ${s.mainSkill}</div>
                        </div>

                        <div class="tags-container">
                            <b>الخدمات الفرعية:</b><br>
                            ${subSkillsHtml || '<span style="font-size:12px; color:#999;">لا يوجد تخصصات فرعية</span>'}
                        </div>

                        <div class="desc-box">
                            <b>وصف المشروع:</b><br>
                            ${s.projDesc}
                        </div>

                        <div class="btns">
                            <button class="btn approve" onclick="approveStore('${key}')">✅ موافقة وتوليد كلمة سر</button>
                            <button class="btn reject" onclick="rejectStore('${key}')">❌ رفض الطلب</button>
                        </div>
                    </div>
                `;
            });
        });
    }

    function approveStore(key) {
        db.ref("Pending_Stores/" + key).once("value", snap => {
            const storeData = snap.val();
            // توليد كلمة سر تبدأ بـ ALB لتمييز المتاجر
            const generatedPass = "ALB-" + Math.floor(1000 + Math.random() * 9000);
            
            // نقل البيانات إلى المتاجر النشطة
            db.ref("Active_Stores/" + storeData.ownerPhone).set({
                ...storeData,
                password: generatedPass,
                status: "active",
                approvedAt: new Date().toLocaleString()
            }).then(() => {
                // حذف الطلب من المعلقات
                db.ref("Pending_Stores/" + key).remove();
                alert("تم التفعيل بنجاح! ✅\nاسم المتجر: " + storeData.bizName + "\nكلمة السر: " + generatedPass + "\n\nأخبر التاجر أن يدخل بالرقم وكلمة السر هذه.");
            });
        });
    }

    function rejectStore(key) {
        if(confirm("هل أنت متأكد من رفض هذا المتجر وحذف بياناته؟")) {
            db.ref("Pending_Stores/" + key).remove().then(() => {
                alert("تم حذف الطلب.");
            });
        }
    }
</script>
</body>
</html>
