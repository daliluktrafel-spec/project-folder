<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لوحة المندوب الذكية | متاجر البلاد</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root { --gold: #b89b4a; --dark: #1b1e33; --green: #27ae60; --blue: #3498db; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #f0f2f5; margin: 0; padding: 15px; padding-bottom: 50px; }
        .header-box { background: var(--dark); color: white; padding: 15px; border-radius: 15px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 15px rgba(0,0,0,0.2); border-bottom: 4px solid var(--gold); }
        .profit-card { background: linear-gradient(45deg, #1b1e33, #2c2f4a); color: #e6d38a; padding: 15px; border-radius: 20px; text-align: center; margin-bottom: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.2); border: 1px solid var(--gold); }
        .order-card { background: white; padding: 20px; border-radius: 18px; margin-bottom: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); position: relative; border-right: 6px solid #e67e22; transition: 0.3s; }
        .order-card.my-order { border-right-color: var(--green); }
        .status-tag { position: absolute; top: 15px; left: 15px; font-size: 11px; padding: 5px 12px; border-radius: 20px; font-weight: bold; }
        .tag-new { background: #fff3e0; color: #e67e22; }
        .tag-active { background: #e8f5e9; color: var(--green); }
        .btn { border: none; padding: 12px; width: 100%; border-radius: 12px; font-weight: bold; cursor: pointer; margin-top: 10px; font-family: inherit; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-accept { background: var(--green); color: white; }
        .btn-chat { background: var(--blue); color: white; }
        .btn-maps { background: #4285F4; color: white; }
        .btn-finish { background: var(--dark); color: white; }
        .btn-logout { background: #d45d5d; color: white; padding: 8px 15px; font-size: 12px; width: auto; margin: 0; }
        .order-info b { color: var(--dark); font-size: 18px; }
        .order-info p { margin: 8px 0; color: #555; font-size: 14px; line-height: 1.5; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }
        .new-order-anim { animation: pulse 1.5s infinite; }
    </style>
</head>
<body>

    <div class="header-box">
        <div>
            <h2 style="margin:0; font-size: 18px;">لوحة المناديب 🛵</h2>
            <small id="driver-name-display">مرحباً بك</small>
        </div>
        <button class="btn btn-logout" onclick="logoutDriver()">خروج</button>
    </div>

    <div class="profit-card">
        <p style="margin:0; font-size: 13px; opacity: 0.8;">💰 أرباحك المحققة اليوم</p>
        <h2 id="driver-daily-profit" style="margin: 5px 0 0; font-size: 28px;">0 <small style="font-size: 14px;">ر.ي</small></h2>
    </div>

    <div id="orders-list">
        <p style="text-align:center; padding:50px; color:#888;">جاري البحث عن طلبات...</p>
    </div>

    <audio id="notif-sound" src="https://assets.mixkit.co/active_storage/sfx/2358/2358-preview.mp3" preload="auto"></audio>

    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <script src="firebase.js"></script>
    <script>
        const myPhone = localStorage.getItem("driverPhone");
        const myName = localStorage.getItem("driverName");
        const myRegion = localStorage.getItem("driverRegion");

        if (!myPhone) {
            window.location.href = "driver-login.html";
        } else {
            document.getElementById("driver-name-display").innerText = "المندوب: " + myName;
            loadOrders();
            updateDriverEarnings();
        }

        let lastOrdersCount = 0;
        const soundEffect = document.getElementById("notif-sound");

        function loadOrders() {
            database.ref("Orders").on("value", snap => {
                const list = document.getElementById("orders-list");
                list.innerHTML = "";
                const data = snap.val() || {};
                
                // تحويل البيانات لمصفوفة لسهولة الفلترة والترتيب
                const ordersArray = Object.keys(data).map(key => ({
                    id: key,
                    ...data[key]
                })).sort((a, b) => (b.timestamp || 0) - (a.timestamp || 0));

                // المندوب يرى طلباته الخاصة أو طلبات المزاد في منطقته
                const filteredOrders = ordersArray.filter(ord => 
                    ord.driverPhone === myPhone || (ord.status === "waiting" && ord.region === myRegion)
                );

                const newOrdersCount = filteredOrders.filter(o => o.status === "waiting").length;
                if (newOrdersCount > lastOrdersCount) {
                    soundEffect.play().catch(() => {});
                    if (navigator.vibrate) navigator.vibrate([200, 100, 200]);
                }
                lastOrdersCount = newOrdersCount;

                if (filteredOrders.length === 0) {
                    list.innerHTML = `<div style='text-align:center; padding:50px;'><p>لا توجد طلبات متاحة حالياً</p></div>`;
                    return;
                }

                filteredOrders.forEach(ord => {
                    const isWaiting = ord.status === 'waiting';
                    const isDelivered = ord.status === 'delivered';
                    
                    list.innerHTML += `
                        <div class="order-card ${isWaiting ? 'new-order-anim' : 'my-order'}">
                            <span class="status-tag ${isWaiting ? 'tag-new' : 'tag-active'}">
                                ${isWaiting ? '🔔 طلب جديد (متاح)' : (isDelivered ? '✅ مكتمل' : '🚚 قيد التوصيل')}
                            </span>
                            
                            <div class="order-info">
                                <b>${ord.pName || ord.product || 'منتج'}</b>
                                <p>
                                    👤 الزبون: <b>${ord.customer}</b><br>
                                    🏪 المتجر: ${ord.store || 'غير محدد'}<br>
                                    💰 السعر: <span style="color:var(--green); font-weight:bold;">${ord.price}</span>
                                </p>
                            </div>

                            ${isWaiting ? 
                                `<button class="btn btn-accept" onclick="acceptOrder('${ord.id}')">✅ قبول الطلب (خطف)</button>` : 
                                (!isDelivered ? `
                                    <button class="btn btn-maps" onclick="smartOpenMaps('${ord.region}', '${ord.gps || ''}')">📍 موقع البيت (GPS)</button>
                                    <button class="btn btn-chat" onclick="goToChat('${ord.id}')">💬 دردشة مع الزبون</button>
                                    <button class="btn btn-finish" onclick="finishOrder('${ord.id}')">🏁 تم التوصيل</button>
                                ` : `<p style="text-align:center; color:var(--green); font-weight:bold; margin-top:15px;">تمت المهمة بنجاح ✨</p>`)
                            }
                        </div>
                    `;
                });
            });
        }

        function acceptOrder(orderId) {
            database.ref("Orders/" + orderId).transaction((order) => {
                if (order && order.status === "waiting") {
                    order.status = "picked";
                    order.driverPhone = myPhone;
                    order.driverName = myName;
                    return order;
                }
                return; 
            }, (error, committed) => {
                if (committed) {
                    alert("مبروك! ربحت الطلب ✅");
                    updateDriverRank(myPhone);
                } else {
                    alert("للأسف، مندوب آخر خطف الطلب قبلك 🏃‍♂️");
                }
            });
        }

        function updateDriverRank(phone) {
            const ref = database.ref("Deliveries/" + phone);
            ref.child("completedCount").transaction(c => (c || 0) + 1)
            .then(() => {
                ref.once("value", s => {
                    if (s.val() && s.val().completedCount >= 50) {
                        ref.update({ rank: "مميز ⭐" });
                    }
                });
            });
        }

        function finishOrder(id) {
            if(confirm("هل استلمت المبلغ؟")) {
                const today = new Date().toLocaleDateString('en-CA');
                database.ref("Orders/" + id).update({ 
                    status: "delivered",
                    deliveryDate: today 
                });
            }
        }

        function updateDriverEarnings() {
            database.ref("Orders").orderByChild("driverPhone").equalTo(myPhone).on("value", snap => {
                const today = new Date().toLocaleDateString('en-CA');
                let completedToday = 0;
                snap.forEach(child => {
                    const ord = child.val();
                    if(ord.status === "delivered" && ord.deliveryDate === today) {
                        completedToday++;
                    }
                });
                document.getElementById("driver-daily-profit").innerText = (completedToday * 1000).toLocaleString() + " ر.ي";
            });
        }

        function smartOpenMaps(region, gps) {
            let url = gps ? `https://www.google.com/maps/search/?api=1&query=${gps}` : `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(region)}`;
            window.open(url, '_blank');
        }

        function goToChat(orderId) {
            window.location.href = "driver-chat.html?orderId=" + orderId;
        }

        function logoutDriver() {
            if(confirm("تسجيل الخروج؟")) {
                localStorage.removeItem("driverPhone");
                localStorage.removeItem("driverName");
                localStorage.removeItem("driverRegion");
                window.location.href = "driver-login.html";
            }
        }
    </script>
</body>
</html>
