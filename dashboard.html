<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>دخول المتجر - متاجر البلاد</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root { --gold: #b89b4a; --dark: #1b1e33; }
        body { 
            margin: 0; font-family: 'Cairo', sans-serif; 
            background: linear-gradient(135deg, #f7f6f2 0%, #d1c7a3 100%);
            display: flex; justify-content: center; align-items: center; height: 100vh; 
        }
        .login-box { 
            background: white; padding: 40px 30px; border-radius: 25px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.1); width: 90%; max-width: 350px; 
            text-align: center; border-top: 5px solid var(--gold);
        }
        .login-box h2 { color: var(--dark); margin-bottom: 5px; font-size: 22px; }
        .store-tag { color: var(--gold); font-weight: bold; margin-bottom: 25px; display: block; }
        .login-box input { 
            width: 100%; padding: 15px; margin: 10px 0; border: 2px solid #eee; 
            border-radius: 12px; box-sizing: border-box; outline: none; font-size: 16px; transition: 0.3s;
            text-align: center;
        }
        .login-box input:focus { border-color: var(--gold); }
        .login-box button { 
            width: 100%; padding: 15px; background: var(--dark); color: white; 
            border: none; border-radius: 12px; cursor: pointer; font-weight: bold; font-size: 16px; margin-top: 15px;
        }
        .login-box button:hover { background: #2c2f4a; transform: translateY(-2px); }
        #error-msg { color: #e74c3c; font-size: 14px; margin-top: 15px; font-weight: bold; }
    </style>
</head>
<body>

<div class="login-box">
    <h2>تسجيل الدخول</h2>
    <span id="store-name" class="store-tag">اسم المتجر</span>
    <input type="password" id="password" placeholder="أدخل كلمة السر الخاصة بمتجرك">
    <button id="login-btn">دخول للوحة التحكم</button>
    <div id="error-msg"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script src="firebase.js"></script>

<script>
    // جلب البيانات المخزنة من صفحة المتاجر
    const storeName = localStorage.getItem("selectedStore");
    // تنظيف المعرف فوراً من أي مسافات زائدة قد تأتي من صفحة المتاجر
    const identifier = localStorage.getItem("storeID") ? localStorage.getItem("storeID").trim() : null;
    const type = localStorage.getItem("storeType");

    // إذا لم تتوفر بيانات المتجر، نرجعه لصفحة الاختيار
    if (!storeName || !identifier) {
        window.location.href = "stores.html";
    }

    document.getElementById("store-name").innerText = "🏪 " + storeName;

    document.getElementById("login-btn").onclick = () => {
        const inputPass = document.getElementById("password").value.trim();
        const errorMsg = document.getElementById("error-msg");

        if(!inputPass) {
            errorMsg.innerText = "⚠️ يرجى إدخال كلمة السر";
            return;
        }

        // تحديد المسار الصحيح
        // ملاحظة: تأكد أن "password" في Firebase مكتوبة بهذا الشكل تماماً (الصغيرة p)
        const path = (type === "new") ? `Active_Stores/${identifier}/password` : `storePasswords/${identifier}`;

        console.log("جارٍ فحص المسار:", path); // للتحقق في الـ Console

        database.ref(path).once("value").then(snap => {
            if(snap.exists()){
                const realPass = String(snap.val()).trim(); // تحويل للقيمة لنص وتنظيفها
                
                if(inputPass === realPass) {
                    // ✅ نجاح الدخول
                    localStorage.setItem("storeLoggedIn", storeName);
                    localStorage.setItem("selectedStore", storeName); // نؤكد التخزين للوحة التحكم
                    
                    errorMsg.style.color = "green";
                    errorMsg.innerText = "✅ تم التحقق.. جاري الدخول";
                    
                    // توجيه لداشبورد بعد نصف ثانية
                    setTimeout(() => {
                        window.location.href = "dashboard.html";
                    }, 500);
                } else {
                    errorMsg.innerText = "❌ كلمة السر خاطئة!";
                }
            } else {
                errorMsg.innerText = "❌ لم يتم العثور على كلمة سر.. تواصل مع الإدارة";
                console.log("المسار غير موجود في Firebase:", path);
            }
        }).catch(err => {
            console.error(err);
            errorMsg.innerText = "🌐 خطأ في الاتصال.. تأكد من إنترنت سيئون!";
        });
    };
</script>
</body>
</html>
